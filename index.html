<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CareerOS Verify | Job Integrity & Active Vacancy Assurance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./styles.css">
  <script src="./verify-engine.js"></script>
  <script src="./verify-seeds.js"></script>
  <script src="./verify-store.js"></script>
  <script src="./permissions.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="./viz.js"></script>
  <script src="./app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()" x-cloak>
  <template x-if="screen !== 'employer'">
    <div>
      <header class="site-header">
        <div class="max public-nav">
          <button class="brand text-button" @click="navigate('home')">
            <span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span>
            <span>CareerOS <b>Verify</b></span>
          </button>
          <nav class="nav-links" aria-label="Primary navigation">
            <button @click="navigate('home');setTimeout(()=>document.getElementById('how')?.scrollIntoView({behavior:'smooth'}),0)">How It Works</button>
            <button @click="navigate('home');setTimeout(()=>document.getElementById('verified-vacancy')?.scrollIntoView({behavior:'smooth'}),0)">Verified Vacancy</button>
            <button @click="navigate('home');setTimeout(()=>document.getElementById('impact')?.scrollIntoView({behavior:'smooth'}),0)">Network Impact</button>
          </nav>
          <button class="btn btn-primary" @click="navigate('login')">Log In</button>
        </div>
      </header>

      <main x-show="screen === 'home'">
        <section class="hero">
          <div class="max hero-grid">
            <div>
              <h1>Clean the signal before it shapes a <span>career.</span></h1>
              <p>CareerOS turns internal approval evidence and ongoing hiring behaviour into verified labour-demand infrastructure, so career decisions are not built on abandoned or imaginary vacancies.</p>
              <div class="hero-actions">
                <button class="btn btn-primary" @click="navigate('login')">Log In <i class="fa-solid fa-arrow-right"></i></button>
                <button class="btn btn-secondary" @click="document.getElementById('how')?.scrollIntoView({behavior:'smooth'})">Explore How It Works</button>
              </div>
              <div class="hero-proof">
                <span><i class="fa-solid fa-shield-halved"></i> Authorisation carried into the public signal</span>
                <span><i class="fa-solid fa-chart-line"></i> Hiring behaviour measured over time</span>
                <span><i class="fa-solid fa-clock"></i> Stale demand removed</span>
              </div>
            </div>
            <div class="hero-panel">
              <div class="passport-head"><div><strong>Demand Signal Integrity</strong><div class="muted-line">All postings vs verified active roles</div></div><i class="fa-solid fa-chart-column verify-icon"></i></div>
              <div class="signal-comparison"><div><span>Advertised SQL demand</span><strong>12</strong><div class="signal-bar"><i style="width:100%"></i></div></div><div><span>Verified active demand</span><strong>5</strong><div class="signal-bar verified"><i style="width:42%"></i></div></div></div>
              <div class="signal-delta"><strong>58% unsupported signal</strong><span>The delta changes which skills appear valuable.</span></div>
            </div>
          </div>
        </section>

        <section id="how" class="public-section">
          <div class="max section-grid">
            <div><h2 class="section-title">The evidence exists inside the ATS. It normally dies there.</h2><p class="section-copy">Employers already know whether headcount is funded, who approved it, and whether hiring remains active. CareerOS carries that evidence across the employer boundary and keeps correcting the public signal after publication.</p></div>
            <div class="problem-list"><div class="problem">A ghost job distorts every matching, salary, and skills model that consumes it.</div><div class="problem">Students and universities act on demand signals three to four years before outcomes arrive.</div><div class="problem">Without reconfirmation, abandoned vacancies remain indistinguishable from genuine demand.</div></div>
          </div>
        </section>

        <section class="public-section">
          <div class="max section-grid">
            <div><h2 class="section-title">Post normally. CareerOS handles the checks.</h2><p class="section-copy">CareerOS completes integrity checks automatically in the background. Recruiters and managers only act when a vacancy needs attention.</p><div class="benefit-row"><span><i class="fa-solid fa-check"></i> No duplicate data entry</span><span><i class="fa-solid fa-check"></i> One-click manager confirmation when needed</span><span><i class="fa-solid fa-check"></i> Stale vacancies automatically removed from the signal</span></div></div>
            <div class="workflow">
              <div class="workflow-step"><span class="workflow-n">01</span><div><strong>Post normally</strong><p>Recruiters use one familiar posting form. Existing ATS and approval evidence is represented in the prototype.</p></div></div>
              <div class="workflow-step"><span class="workflow-n">02</span><div><strong>CareerOS checks automatically</strong><p>Automated Validation evaluates approval evidence, completeness, realism, consistency, and supporting market context.</p></div></div>
              <div class="workflow-step"><span class="workflow-n">03</span><div><strong>Only exceptions need attention</strong><p>Green roles publish immediately. Amber roles receive quick fixes. Red roles receive a concise Manager Confirmation.</p></div></div>
              <div class="workflow-step"><span class="workflow-n">04</span><div><strong>Active hiring is reconfirmed later</strong><p>Managers answer one question. Unconfirmed roles are automatically paused and removed from verified demand.</p></div></div>
            </div>
          </div>
        </section>

        <section id="verified-vacancy" class="public-section">
          <div class="max"><h2 class="section-title">The workflow collects evidence. The behaviour history becomes the moat.</h2><div class="three-col feature-row"><article class="feature"><i class="fa-solid fa-scale-balanced"></i><h3>Explainable Posting Integrity</h3><p>Five deterministic factors show why a vacancy is Green, Amber, or Red. Market comparison supports the decision but never controls it.</p></article><article class="feature"><i class="fa-solid fa-timeline"></i><h3>Employer Integrity Rating</h3><p>Reconfirmation, stale-posting, decision-latency, and hiring outcomes compound into a behaviour time series competitors cannot copy overnight.</p></article><article class="feature"><i class="fa-solid fa-graduation-cap"></i><h3>Aligned incentives</h3><p>Verified employers earn a graduate-talent distribution advantage while Talentbank and universities receive cleaner demand evidence.</p></article></div></div>
        </section>

        <section id="impact" class="public-section">
          <div class="max section-grid"><div><h2 class="section-title">A trusted vacancy becomes a trusted demand signal.</h2><p class="section-copy">Only Green fast-path or manager-confirmed jobs that are published and recently reconfirmed contribute to Talentbank’s demand network. Drafts, pending roles, stale jobs, filled jobs, and closed roles are excluded.</p></div><div class="workflow"><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-building"></i></span><div><strong>Employers</strong><p>Clear accountability without routine approval bureaucracy.</p></div></div><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-user-check"></i></span><div><strong>Candidates</strong><p>Evidence that a role is approved, realistic, and still active.</p></div></div><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-network-wired"></i></span><div><strong>Talentbank Network</strong><p>Cleaner matching inputs and more reliable demand data.</p></div></div></div></div>
        </section>
        <section class="final-cta"><h2>Build career intelligence on demand you can defend.</h2><p>Experience how Recruiters, Hiring Managers, and HR Administrators create an accountable signal together.</p><button class="btn btn-primary" @click="navigate('login')">Log In <i class="fa-solid fa-arrow-right"></i></button></section>
      </main>

      <main x-show="screen === 'login'" class="auth-wrap">
        <form class="auth-card auth-card-wide" @submit.prevent="login()">
          <button type="button" class="text-button" @click="navigate('home')"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
          <h1>Log in to CareerOS Verify</h1>
          <p>Use one of the seeded accounts to explore a specific responsibility in the employer workflow.</p>
          <div class="field"><label>Business email</label><input required type="email" x-model="loginEmail" class="input" autocomplete="username"></div>
          <div class="field"><label>Password</label><input required type="password" x-model="loginPassword" class="input" autocomplete="current-password"></div>
          <p x-show="authError" class="form-error" x-text="authError"></p>
          <button class="btn btn-primary full-button">Log In</button>
          <div class="demo-access">
            <h2>Judge demonstration accounts</h2>
            <div class="demo-options">
              <template x-for="user in CareerOSAuth.DEMO_USERS" :key="user.userId">
                <button type="button" class="demo-account" @click="chooseDemo(user)">
                  <span class="demo-account-icon"><i class="fa-solid" :class="user.role === 'recruiter' ? 'fa-pen-to-square' : user.role === 'hiring_manager' ? 'fa-user-check' : 'fa-shield-halved'"></i></span>
                  <span><strong x-text="`Use ${user.roleLabel} Demo`"></strong><small x-text="`${user.name} · ${user.email}`"></small></span>
                </button>
              </template>
            </div>
            <p class="demo-explanation">Demo access allows judges to explore each responsibility. In production, roles would be assigned by an authorised administrator and enforced by the backend.</p>
          </div>
          <p class="auth-switch">Don’t have an account? <button type="button" class="text-button" @click="navigate('signup')">Create account</button></p>
        </form>
      </main>

      <main x-show="screen === 'signup'" class="auth-wrap">
        <section class="auth-card prototype-message">
          <button type="button" class="text-button" @click="navigate('login')"><i class="fa-solid fa-arrow-left"></i> Back to Log In</button>
          <i class="fa-solid fa-building-user prototype-icon"></i>
          <h1>Account creation is simulated</h1>
          <p>In production, an authorised HR Administrator would create your organisation account, verify your identity, and assign your role. Use a demonstration account to continue exploring the prototype.</p>
          <button class="btn btn-primary full-button" @click="navigate('login')">Choose a Demo Account</button>
        </section>
      </main>

      <footer x-show="screen === 'home'" class="footer"><div class="max footer-row"><span>CareerOS Verify · Job Integrity & Active Vacancy Assurance</span><span>Built for trustworthy employer demand signals.</span></div></footer>
    </div>
  </template>

  <template x-if="screen === 'employer' && currentUser">
    <div class="workspace">
      <header class="workspace-top">
        <button class="brand text-button" @click="setPage('overview')"><span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span><span>CareerOS <b>Verify</b></span></button>
        <div class="workspace-actions">
          <div class="user-identity"><strong x-text="currentUser?.name"></strong><span x-text="`${currentUser?.roleLabel || ''} · ${currentUser?.organisation || ''}`"></span></div>
          <span class="role-badge" x-text="currentUser?.roleLabel"></span>
          <button class="btn btn-secondary btn-small" @click="signOut()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out</button>
        </div>
      </header>

      <div class="workspace-layout">
        <aside class="sidebar" aria-label="Workspace navigation">
          <template x-for="item in navItems()" :key="item.id"><button class="side-button" :class="workspacePage===item.id?'active':''" @click="item.id==='create' ? startJob() : setPage(item.id)"><i class="fa-solid" :class="item.icon"></i><span x-text="item.label"></span></button></template>
          <div class="sidebar-account"><span>Signed in as</span><strong x-text="currentUser?.email"></strong><small x-text="currentUser?.departmentScope || currentUser?.department"></small></div>
        </aside>

        <main class="workspace-main">
          <section x-show="workspacePage === 'overview'">
            <div class="page-heading"><div><span class="responsibility-label" x-text="currentUser?.roleLabel"></span><h1 x-text="dashboardCopy().title"></h1><p>Automatic by default. Human attention only for exceptions and accountable decisions.</p></div><div class="heading-actions"><button x-show="currentUser?.role === 'recruiter'" class="btn btn-primary" @click="startJob()"><i class="fa-solid fa-plus"></i> Create Job</button><button x-show="currentUser?.role === 'hiring_manager'" class="btn btn-primary" @click="setPage('approvals')">Review Confirmations</button><button x-show="currentUser?.role === 'hr_admin'" class="btn btn-primary" @click="setPage('audit')">Open Audit Log</button></div></div>
            <div class="metric-grid role-metrics"><template x-for="card in overviewCards()" :key="card[0]"><article class="metric"><span x-text="card[0]"></span><strong x-text="card[1]"></strong></article></template></div>
            <div class="panel action-required">
              <div class="action-intro"><i class="fa-solid fa-list-check"></i><h2 x-text="currentUser?.role === 'hr_admin' ? 'Governance alerts' : 'Your next decisions'"></h2><p x-text="currentUser?.role === 'recruiter' ? 'CareerOS surfaces only the postings that need your attention.' : currentUser?.role === 'hiring_manager' ? 'Only exceptions and freshness decisions require your accountability.' : 'Focus on exceptions, overdue activity, and organisation-wide integrity.'"></p></div>
              <div class="action-list"><template x-for="job in actionJobs()" :key="job.id"><button class="action-row action-button" @click="openAction(job)"><span><strong x-text="nextAction(job)"></strong><small x-text="`${job.title} · ${statusLabel(job.status)}`"></small></span><i class="fa-solid fa-chevron-right"></i></button></template><div x-show="!actionJobs().length" class="empty compact-empty">No actions require attention.</div></div>
            </div>
            <div class="panel lifecycle-panel"><div><span class="layer-number">1</span><strong>Posting Integrity runs automatically</strong><p>Green jobs move quickly; Amber details stay with the recruiter.</p></div><i class="fa-solid fa-arrow-right"></i><div><span class="layer-number">2</span><strong>Manager Confirmation handles Red exceptions</strong><p>The assigned manager confirms funding, intent, and accuracy only when needed.</p></div></div>
          </section>

          <section x-show="workspacePage === 'create'">
            <div class="page-heading"><div><h1 x-text="draft.id ? 'Edit Job' : 'Create Job'"></h1><p>Post normally. CareerOS checks the vacancy continuously and only routes exceptions for human attention.</p></div><div class="heading-actions demo-scenarios"><span>Demo:</span><button class="btn btn-secondary btn-small" @click="loadDemoDraft('green')">Green</button><button class="btn btn-secondary btn-small" @click="loadDemoDraft('amber')">Amber</button><button class="btn btn-secondary btn-small" @click="loadDemoDraft('red')">Red</button></div></div>
            <div class="posting-layout">
              <form class="panel posting-form" @submit.prevent="handlePostingCta()">
                <section class="form-section"><div class="form-section-heading"><span>01</span><div><h2>Approval and ownership</h2><p>Mock ATS evidence represents where production requisition data would connect.</p></div></div><div class="form-grid">
                  <div class="field"><label>Requisition ID</label><input class="input" x-model="draft.requisitionId" placeholder="REQ-2026-0150"></div>
                  <div class="field"><label>Department</label><input class="input" x-model="draft.department"></div>
                  <div class="field"><label>Assigned Hiring Manager</label><select class="input" x-model="draft.hiringManagerId"><option value="">Select manager</option><option :value="CareerOSAuth.DEMO_USERS.find(u=>u.role==='hiring_manager').userId">Daniel Lee · Technology</option></select></div>
                  <div class="field"><label>Approval evidence source</label><input class="input" x-model="draft.approvalEvidenceSource" placeholder="e.g. Workday requisition"></div>
                  <div class="field"><label>Approval evidence date</label><input type="date" class="input" x-model="draft.approvalEvidenceDate"></div>
                  <div class="field"><label>Target start date</label><input type="date" class="input" x-model="draft.targetStartDate"></div>
                  <div class="field"><label>Headcount approved</label><select class="input" x-model.boolean="draft.headcountApproved"><option :value="false">No</option><option :value="true">Yes</option></select></div>
                  <div class="field"><label>Budget approved</label><select class="input" x-model.boolean="draft.budgetApproved"><option :value="false">No</option><option :value="true">Yes</option></select></div>
                  <div class="field full"><label>Business justification</label><textarea class="input textarea" x-model="draft.justification" placeholder="Why is this vacancy required now?"></textarea></div>
                </div></section>
                <section class="form-section"><div class="form-section-heading"><span>02</span><div><h2>Job details</h2><p>The same familiar fields used in a normal employer posting flow.</p></div></div><div class="form-grid">
                  <div class="field"><label>Job title</label><input class="input" x-model="draft.title" placeholder="e.g. Data Analyst"></div>
                  <div class="field"><label>Location</label><input class="input" x-model="draft.location"></div>
                  <div class="field"><label>Workplace arrangement</label><select class="input" x-model="draft.workplace"><option value="hybrid">Hybrid</option><option value="onsite">On-site</option><option value="remote">Remote</option></select></div>
                  <div class="field"><label>Employment type</label><select class="input" x-model="draft.employmentType"><option value="">Select type</option><option value="full-time">Full-time</option><option value="part-time">Part-time</option><option value="contract">Contract</option><option value="internship">Internship</option></select></div>
                  <div class="field"><label>Seniority</label><select class="input" x-model="draft.seniority"><option value="entry">Entry level</option><option value="mid">Mid level</option><option value="senior">Senior</option><option value="director">Director</option><option value="intern">Internship</option></select></div>
                  <div class="field"><label>Salary visibility</label><select class="input" x-model.boolean="draft.salaryVisible"><option :value="true">Visible to candidates</option><option :value="false">Hidden</option></select></div>
                  <div class="field"><label>Minimum salary</label><input type="number" class="input" x-model.number="draft.salaryMin"></div>
                  <div class="field"><label>Maximum salary</label><input type="number" class="input" x-model.number="draft.salaryMax"></div>
                  <div class="field full"><label>Job description</label><textarea class="input textarea tall" x-model="draft.summary"></textarea></div>
                  <div class="field full"><label>Responsibilities</label><textarea class="input textarea" x-model="draftResponsibilities" placeholder="One responsibility per line"></textarea></div>
                </div></section>
                <section class="form-section"><div class="form-section-heading"><span>03</span><div><h2>Requirements</h2><p>Add only requirements that are genuinely necessary.</p></div><button type="button" class="btn btn-secondary btn-small" @click="addRequirement()"><i class="fa-solid fa-plus"></i> Add</button></div><template x-for="(requirement,index) in draft.requirements" :key="index"><div class="requirement"><div class="field"><label>Requirement</label><input class="input" x-model="requirement.name"></div><div class="field"><label>Type</label><select class="input" x-model="requirement.type"><option value="skill">Skill</option><option value="experience">Experience</option><option value="education">Education</option></select></div><div class="field"><label>Priority</label><select class="input" x-model.boolean="requirement.required"><option :value="true">Required</option><option :value="false">Preferred</option></select></div><div class="field"><label>Min. years</label><input type="number" min="0" class="input" x-model.number="requirement.yearsExperience"></div><div class="field"><label>Justification</label><input class="input" x-model="requirement.justification"></div><button type="button" class="btn btn-secondary btn-small remove" @click="removeRequirement(index)" aria-label="Remove requirement"><i class="fa-solid fa-trash"></i></button></div></template></section>
                <div class="posting-actions"><button type="button" class="btn btn-secondary" @click="saveDraft()">Save Draft</button><button data-testid="posting-primary-action" class="btn btn-primary" type="submit" :disabled="draftIntegrity().riskLevel==='red' && !canRouteDraft()" x-text="postingCtaLabel()"></button></div>
              </form>
              <aside class="panel posting-integrity-panel" :class="riskClass(draftIntegrity().riskLevel)">
                <div class="integrity-panel-head"><div><span class="responsibility-label">Live background check</span><h2>Posting Integrity</h2></div><span class="integrity-badge" :class="riskClass(draftIntegrity().riskLevel)" x-text="draftIntegrity().riskLevel.toUpperCase()"></span></div>
                <div class="integrity-score-simple"><strong x-text="draftIntegrity().score"></strong><span>/ 100</span></div>
                <h3 x-text="riskLabel(draftIntegrity().riskLevel)"></h3><p class="integrity-guidance" x-text="integrityMessage(draftIntegrity())"></p>
                <div class="priority-issues"><template x-for="item in draftIntegrity().topReasons" :key="item.id"><div><i class="fa-solid" :class="draftIntegrity().riskLevel==='red'?'fa-circle-exclamation':'fa-arrow-right'"></i><span x-text="item.message"></span></div></template><div x-show="!draftIntegrity().topReasons.length" class="integrity-clear"><i class="fa-solid fa-circle-check"></i><span>No material issues detected.</span></div></div>
                <details class="integrity-evidence"><summary>View full evidence</summary><div class="factor-list"><template x-for="[key,value] in Object.entries(draftIntegrity().factors)" :key="key"><div><span x-text="factorLabel(key)"></span><strong x-text="value"></strong></div></template></div><div class="passed-list"><template x-for="item in draftIntegrity().passedChecks" :key="item.id"><span><i class="fa-solid fa-check"></i><span x-text="item.message"></span></span></template></div></details>
                <button type="button" class="btn btn-secondary full-button" @click="validate(draft)"><i class="fa-solid fa-rotate"></i> Refresh check <small>Demo only</small></button>
                <p class="integration-note"><i class="fa-solid fa-plug"></i> Production: ATS evidence and checks update automatically.</p>
              </aside>
            </div>
          </section>

          <section x-show="workspacePage === 'approvals'">
            <div class="page-heading"><div><h1 x-text="currentUser?.role === 'recruiter' ? 'Manager Confirmations' : currentUser?.role === 'hiring_manager' ? 'Confirmation Queue' : 'Confirmation Oversight'"></h1><p x-text="currentUser?.role === 'recruiter' ? 'Track only the Red exceptions sent for manager accountability.' : currentUser?.role === 'hiring_manager' ? 'Concise decisions first. Open full evidence only when you need it.' : 'Monitor confirmation delays and exceptions across the organisation.'"></p></div><span class="role-badge" x-text="currentUser?.roleLabel"></span></div>
            <div x-show="currentUser?.role === 'hiring_manager'" class="confirmation-grid"><template x-for="job in approvalJobs().filter(item=>item.status==='pending_approval')" :key="job.id"><article class="panel confirmation-card"><div class="confirmation-card-head"><div><span class="responsibility-label">Manager Confirmation</span><h2 x-text="job.title"></h2><p x-text="`${job.department} · ${personName(job.recruiterId)}`"></p></div><span class="integrity-badge" :class="riskClass(integrity(job).riskLevel)" x-text="`${integrity(job).riskLevel.toUpperCase()} · ${integrity(job).score}`"></span></div><div class="confirmation-evidence"><span>Approval evidence</span><strong x-text="job.approvalEvidenceSource || 'Manager attestation required'"></strong><small x-text="job.requisitionId || 'No requisition linked'"></small></div><div class="compact-warnings"><template x-for="item in integrity(job).topReasons" :key="item.id"><span><i class="fa-solid fa-circle-exclamation"></i><span x-text="item.message"></span></span></template></div><button type="button" class="btn btn-primary full-button" @click="activeJobId = job.id; managerAttests = false; openSubmission(job)">Review &amp; Confirm <i class="fa-solid fa-arrow-right"></i></button><small class="delivery-note">Production delivery: email, ATS, Teams or Slack.</small></article></template><div x-show="!approvalJobs().some(item=>item.status==='pending_approval')" class="panel empty">No vacancies need your confirmation.</div></div>
            <div x-show="currentUser?.role !== 'hiring_manager'" class="panel table-wrap"><table class="table"><thead><tr><th>Role</th><th>Recruiter</th><th>Assigned Manager</th><th>Posting Integrity</th><th>Status</th><th>Actions</th></tr></thead><tbody><template x-for="job in approvalJobs()" :key="job.id"><tr><td><strong x-text="job.title"></strong><small class="table-sub" x-text="job.department"></small></td><td x-text="personName(job.recruiterId)"></td><td x-text="personName(job.hiringManagerId)"></td><td><strong :class="scoreClass(integrity(job).score)" x-text="`${integrity(job).score}/100`"></strong><small class="table-sub" x-text="riskLabel(integrity(job).riskLevel)"></small></td><td><span class="status" :class="statusClass(job.status)" x-text="statusLabel(job.status)"></span></td><td><div class="listing-actions"><button class="btn btn-secondary btn-small" @click="openSubmission(job)">View Job Evidence</button><button x-show="currentUser?.role==='recruiter' && job.status==='pending_approval'" class="btn btn-secondary btn-small" @click="withdraw(job)">Withdraw</button></div></td></tr></template></tbody></table><div x-show="!approvalJobs().length" class="empty">No confirmations are available in your scope.</div></div>

            <article x-show="activeJobId && job(activeJobId)" class="panel submission-review">
              <div class="page-heading"><div><span class="responsibility-label">Manager Confirmation</span><h2 x-text="job(activeJobId)?.title"></h2><p x-text="`Created by ${personName(job(activeJobId)?.recruiterId)} · Assigned to ${personName(job(activeJobId)?.hiringManagerId)}`"></p></div><span class="status" :class="statusClass(job(activeJobId)?.status)" x-text="statusLabel(job(activeJobId)?.status)"></span></div>
              <div class="evidence-grid">
                <div class="evidence-block"><span>Posting Integrity</span><strong :class="scoreClass(integrity(job(activeJobId)).score)" x-text="`${integrity(job(activeJobId)).score} / 100`"></strong><small x-text="riskLabel(integrity(job(activeJobId)).riskLevel)"></small></div>
                <div class="evidence-block"><span>Approval evidence</span><strong x-text="job(activeJobId)?.requisitionId || 'Not linked'"></strong><small x-text="job(activeJobId)?.approvalEvidenceSource || 'Manager confirmation required'"></small></div>
                <div class="evidence-block"><span>Submission date</span><strong x-text="formatDate(job(activeJobId)?.submittedAt)"></strong><small x-text="`${daysAgo(job(activeJobId)?.submittedAt)} day(s) in queue`"></small></div>
              </div>
              <div class="review-jis"><div id="review-jis-gauge" class="jis-gauge"></div><div><h3>Explainable integrity factors</h3><p class="muted-copy">Approval evidence, posting completeness, requirement realism, internal consistency, and supporting market context.</p><div id="review-jis-components" class="jis-components"></div></div></div>
              <div class="review-columns">
                <div><h3>Top reasons requiring attention</h3><div class="validation-list"><template x-for="issue in integrity(job(activeJobId)).topReasons" :key="issue.id"><div class="issue" :class="issue.severity==='material'?'critical':'warning'"><h4 x-text="issue.severity==='material'?'Material trust risk':'Posting detail'"></h4><p x-text="issue.message"></p></div></template><template x-for="pass in integrity(job(activeJobId)).passedChecks" :key="pass.id"><div class="issue pass"><h4>Passed check</h4><p x-text="pass.message"></p></div></template></div></div>
                <div><h3>Audit history</h3><div class="validation-list"><template x-for="event in audit.filter(event=>event.jobId===activeJobId).slice(0,5)" :key="event.id"><div class="issue"><h4 x-text="event.action.replaceAll('_',' ')"></h4><p x-text="`${event.actorName || 'System'} · ${formatDateTime(event.ts)}`"></p><small x-text="event.comment"></small></div></template></div></div>
              </div>
              <div class="job-preview"><h3>Full job preview</h3><p x-text="job(activeJobId)?.summary"></p><ul><template x-for="responsibility in job(activeJobId)?.responsibilities || []" :key="responsibility"><li x-text="responsibility"></li></template></ul><div class="requirement-tags"><template x-for="requirement in job(activeJobId)?.requirements || []" :key="requirement.name"><span x-text="requirement.type==='experience' ? `${requirement.name} · ${requirement.yearsExperience || 0} yrs` : requirement.name"></span></template></div></div>
              <div x-show="currentUser?.role === 'hiring_manager' && job(activeJobId)?.status === 'pending_approval'" class="manager-decision">
                <h3>Manager Confirmation</h3><p class="delivery-note">Production delivery: email, ATS, Teams or Slack. This prototype uses the in-app Confirmation Queue.</p>
                <label class="attestation"><input type="checkbox" x-model="managerAttests"><span>I confirm that this vacancy is approved, funded, genuinely intended to be filled, and accurately represents my department’s needs.</span></label>
                <div class="listing-actions"><button class="btn btn-primary" :disabled="!managerAttests" @click="approve(job(activeJobId))">Approve Vacancy</button><button class="btn btn-secondary" @click="openDecision(job(activeJobId),'request_changes')">Request Changes</button><button class="btn btn-danger" @click="openDecision(job(activeJobId),'reject')">Reject Vacancy</button></div>
              </div>
              <div x-show="currentUser?.role === 'recruiter' && job(activeJobId)?.status === 'pending_approval'" class="boundary-note"><i class="fa-solid fa-lock"></i><span><strong>Sent to Daniel Lee for Manager Confirmation.</strong> Confirmation, rejection, and managerial attestation are unavailable to Recruiters.</span></div>
              <div x-show="job(activeJobId)?.status === 'approved'" class="boundary-note success-note"><i class="fa-solid fa-circle-check"></i><span><strong x-text="`Confirmed by ${personName(job(activeJobId)?.approval?.approverId)} on ${formatDate(job(activeJobId)?.approval?.ts)}.`"></strong> Ready for the assigned Recruiter to publish.</span></div>
            </article>
          </section>

          <section x-show="workspacePage === 'listings'">
            <div class="page-heading"><div><h1 x-text="currentUser?.role === 'recruiter' ? 'My Job Listings' : currentUser?.role === 'hiring_manager' ? 'Team Vacancies' : 'All Job Listings'"></h1><p>Each role sees only the records and actions assigned to its responsibility.</p></div><button x-show="currentUser?.role==='recruiter'" class="btn btn-primary" @click="startJob()"><i class="fa-solid fa-plus"></i> Create Job</button></div>
            <div class="panel table-wrap"><table class="table"><thead><tr><th>Role</th><th>Department</th><th>Posting Integrity</th><th>Confirmation</th><th>Status</th><th>Allowed Actions</th></tr></thead><tbody><template x-for="job in visibleJobs()" :key="job.id"><tr><td><strong x-text="job.title"></strong><small class="table-sub" x-text="job.requisitionId || 'No requisition ID'"></small></td><td x-text="job.department"></td><td><span class="integrity-badge compact" :class="riskClass(integrity(job).riskLevel)" x-text="`${integrity(job).riskLevel.toUpperCase()} · ${integrity(job).score}`"></span></td><td x-text="job.confirmationDueAt ? formatDate(job.confirmationDueAt) : 'Not published'"></td><td><span class="status" :class="statusClass(job.status)" x-text="statusLabel(job.status)"></span></td><td><div class="listing-actions"><button x-show="can('edit_own_job',job)" class="btn btn-secondary btn-small" @click="startJob(job)">Review Job</button><button x-show="job.status==='pending_approval'" class="btn btn-secondary btn-small" @click="setPage('approvals');openSubmission(job)">View Job Evidence</button><button x-show="can('publish_verified_job',job)" class="btn btn-primary btn-small" @click="publish(job)" x-text="job.status==='approved'?'Publish Confirmed Job':'Publish Verified Job'"></button><button x-show="currentUser?.role==='recruiter' && job.status==='published'" class="btn btn-secondary btn-small" @click="candidatePreviewJobId=job.id">View Job Evidence</button><button x-show="can('reconfirm_active_vacancy',job) && ['confirmation_due','paused_stale'].includes(job.status)" class="btn btn-primary btn-small" @click="freshnessJobId=job.id">Confirm Hiring Status</button><button x-show="currentUser?.role==='hr_admin' && can('pause_suspicious_job',job)" class="btn btn-danger btn-small" @click="openDecision(job,'pause_stale')">Pause with Reason</button></div></td></tr></template></tbody></table><div x-show="!visibleJobs().length" class="empty">No job records are available in your authorised scope.</div></div>
          </section>

          <section x-show="workspacePage === 'evidence'">
            <div class="page-heading"><div><h1>Market Evidence</h1><p>Transparent benchmarks support Posting Integrity but never become the sole reason to block a vacancy.</p></div><span class="status status-amber">Demonstration Market Benchmark</span></div>
            <div class="three-col"><div class="panel"><h3>Comparable advertisements</h3><strong class="evidence-number">38</strong><p class="muted-copy">Cached evidence for comparable technology and data roles in Malaysia and Singapore.</p></div><div class="panel"><h3>Experience pattern</h3><strong class="evidence-value">0–2 years</strong><p class="muted-copy">Typical entry-level benchmark. Requests above three years are highlighted.</p></div><div class="panel"><h3>Salary range</h3><strong class="evidence-value">MYR 42k–65k</strong><p class="muted-copy">Salary exceptions are flagged for review, not automatically rejected.</p></div></div>
            <div class="panel panel-spacing"><h2>Evidence classification</h2><div class="validation-list validation-spacing"><div class="issue"><h4>Demonstration Market Benchmark</h4><p>Seeded benchmark data used when a live market source is not connected.</p></div><div class="issue"><h4>Limited Evidence</h4><p>CareerOS keeps validation and approval usable when external evidence is incomplete.</p></div></div></div>
          </section>

          <section x-show="workspacePage === 'impact'">
            <div class="page-heading"><div><span class="responsibility-label">Verified Labour-Demand Infrastructure</span><h1>The delta is the lie.</h1><p>Compare what the market appears to demand with the jobs that were authorised, approved, and recently reconfirmed.</p></div><span class="status status-green">HR Administrator · Read Only</span></div>
            <div class="integrity-rating-band"><div class="integrity-score"><span>Vertex Digital Employer Integrity Rating</span><strong x-text="employerRating().rating ?? 'N/A'"></strong><small x-text="`${employerRating().band} · ${employerRating().sampleSize} historical jobs`"></small></div><div class="rating-components" x-show="employerRating().components"><div><span>On-time reconfirmation</span><strong x-text="`${employerRating().components?.reconfirmOnTime || 0}%`"></strong></div><div><span>Ghost-job avoidance</span><strong x-text="`${employerRating().components?.ghostAvoidance || 0}%`"></strong></div><div><span>Decision speed</span><strong x-text="`${employerRating().components?.decisionSpeed || 0}%`"></strong></div><div><span>Stale-job avoidance</span><strong x-text="`${employerRating().components?.staleAvoidance || 0}%`"></strong></div></div></div>
            <p class="evidence-caveat">Prototype weights are uncalibrated. The rating measures observed vacancy-management behaviour, not employer quality, and is shown with its sample size.</p>
            <div class="network-grid">
              <article class="panel divergence-panel"><div class="panel-heading"><div><h2>Advertised demand vs verified demand</h2><p class="muted-copy" x-text="`${divergence().totalJobs} postings observed · ${divergence().verifiedJobs} currently verified and active`"></p></div></div><div id="demand-divergence-chart"></div><div class="delta-callout" x-show="divergence().rows.length"><strong x-text="`${divergence().rows[0]?.unverifiedShare}% of the apparent demand for ${divergence().rows[0]?.skill}`"></strong><span>came from roles that were not currently authorised, verified, and active.</span></div></article>
              <aside class="panel leaderboard"><h2>Peer integrity benchmark</h2><p class="muted-copy">Seeded demonstration histories. Rankings become credible only as behavioural samples grow.</p><div class="leaderboard-list"><template x-for="(peer,index) in peerRatings()" :key="peer.id"><div class="leaderboard-row" :class="peer.id==='vertex-digital'?'current-org':''"><span class="rank" x-text="index+1"></span><span><strong x-text="peer.name"></strong><small x-text="`${peer.band} · n=${peer.sampleSize}`"></small></span><strong class="peer-score" x-text="peer.rating ?? 'N/A'"></strong></div></template></div></aside>
            </div>
          </section>

          <section x-show="workspacePage === 'audit'">
            <div class="page-heading"><div><h1 x-text="currentUser?.role === 'recruiter' ? 'My Audit History' : currentUser?.role === 'hiring_manager' ? 'Team Audit History' : 'Organisation Audit Log'"></h1><p>Material actions include the actor, assigned responsibility, job, timestamp, transition, and reason.</p></div><span class="role-badge" x-text="currentUser?.roleLabel"></span></div>
            <div class="panel table-wrap"><table class="table"><thead><tr><th>Timestamp</th><th>Actor</th><th>Role</th><th>Action</th><th>Job</th><th>Transition</th><th>Comment / Reason</th></tr></thead><tbody><template x-for="event in scopedAudit()" :key="event.id"><tr><td x-text="formatDateTime(event.ts)"></td><td x-text="event.actorName || 'System'"></td><td x-text="event.actorRole || 'System'"></td><td><strong x-text="event.action.replaceAll('_',' ')"></strong></td><td x-text="job(event.jobId)?.title || 'Workspace'"></td><td x-text="event.fromStatus || event.toStatus ? `${statusLabel(event.fromStatus) || '—'} → ${statusLabel(event.toStatus) || '—'}` : '—'"></td><td x-text="event.comment || '—'"></td></tr></template></tbody></table><div x-show="!scopedAudit().length" class="empty">No audit activity exists in your authorised scope.</div></div>
          </section>

          <section x-show="workspacePage === 'settings'">
            <div class="page-heading"><div><h1>Governance Settings</h1><p>HR Administrator-only demonstration controls and role assignments.</p></div></div>
            <div class="settings-grid">
              <div class="panel"><h2>Policy thresholds</h2><div class="field"><label>Vacancy confirmation interval (days)</label><input type="number" class="input" x-model.number="policy.confirmationDays"></div><div class="field"><label>Manager confirmation service level (days)</label><input type="number" class="input" x-model.number="policy.approvalSlaDays"></div><div class="field"><label>Red-path score threshold</label><input type="number" class="input" x-model.number="policy.minimumValidationScore"></div><button class="btn btn-primary" @click="savePolicy()">Save Policy Settings</button></div>
              <div class="panel"><h2>Users and assigned roles</h2><div class="user-list"><template x-for="user in CareerOSAuth.DEMO_USERS" :key="user.userId"><div class="user-row"><span><strong x-text="user.name"></strong><small x-text="user.email"></small></span><span class="role-badge" x-text="user.roleLabel"></span></div></template></div><p class="muted-copy">Roles are shown for governance visibility. They cannot be changed by users inside the workspace.</p></div>
              <div class="panel danger-panel"><h2>Reset demonstration</h2><p class="muted-copy">Restore all connected lifecycle scenarios and audit events.</p><button class="btn btn-secondary" @click="resetDemo()">Reset Demonstration Data</button></div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </template>

  <template x-if="freshnessJobId && job(freshnessJobId)">
    <div class="modal-bg"><article class="modal"><div class="modal-header"><div><span class="responsibility-label">Active-Hiring Confirmation</span><h2 x-text="job(freshnessJobId).title"></h2><p class="muted-line">Is this vacancy still actively being filled?</p></div><button class="text-button" aria-label="Close active-hiring confirmation" @click="freshnessJobId=null"><i class="fa-solid fa-xmark"></i></button></div><div class="passport-grid"><div class="passport-item"><span>Current status</span><strong x-text="statusLabel(job(freshnessJobId).status)"></strong></div><div class="passport-item"><span>Last confirmed active</span><strong x-text="`${daysAgo(job(freshnessJobId).lastConfirmedAt)} days ago`"></strong></div><div class="passport-item"><span>Confirmation deadline</span><strong x-text="formatDate(job(freshnessJobId).confirmationDueAt)"></strong></div><div class="passport-item"><span>Assigned decision owner</span><strong x-text="personName(job(freshnessJobId).hiringManagerId)"></strong></div></div><div class="listing-actions modal-actions"><button class="btn btn-primary" @click="confirmHiring(job(freshnessJobId))">Yes, Still Hiring</button><button class="btn btn-secondary" @click="setLifecycle(job(freshnessJobId),'mark_filled')">Position Filled</button><button class="btn btn-danger" @click="setLifecycle(job(freshnessJobId),'pause_stale')">Pause Vacancy</button></div></article></div>
  </template>

  <template x-if="candidatePreviewJobId && job(candidatePreviewJobId)">
    <div class="modal-bg"><article class="modal"><div class="modal-header"><div><span class="responsibility-label">CareerOS Verified Vacancy</span><h2 x-text="job(candidatePreviewJobId).title"></h2><p class="muted-line">Candidate-facing verification preview</p></div><button class="text-button" aria-label="Close candidate preview" @click="candidatePreviewJobId=null"><i class="fa-solid fa-xmark"></i></button></div><div class="passport-grid"><div class="passport-item"><span>Employer verification</span><strong>Demo Verified Employer</strong></div><div class="passport-item"><span>Posting Integrity</span><strong x-text="`${integrity(job(candidatePreviewJobId)).score} / 100`"></strong></div><div class="passport-item"><span>Verification path</span><strong x-text="job(candidatePreviewJobId).approval ? `Manager confirmed by ${personName(job(candidatePreviewJobId).approval?.approverId)}` : 'Green fast path'"></strong></div><div class="passport-item"><span>Publication date</span><strong x-text="formatDate(job(candidatePreviewJobId).publishedAt)"></strong></div><div class="passport-item"><span>Last confirmed active</span><strong x-text="`${daysAgo(job(candidatePreviewJobId).lastConfirmedAt)} days ago`"></strong></div><div class="passport-item"><span>Next confirmation date</span><strong x-text="formatDate(job(candidatePreviewJobId).confirmationDueAt)"></strong></div></div><p class="candidate-note">Candidates see safe trust signals only. Budget details, contact information, internal comments, and business justification remain private.</p></article></div>
  </template>

  <template x-if="decisionModal && job(decisionModal.jobId)">
    <div class="modal-bg"><form class="modal decision-modal" @submit.prevent="confirmDecision()"><div class="modal-header"><div><span class="responsibility-label">Accountable Decision</span><h2 x-text="decisionModal.title"></h2><p class="muted-line" x-text="job(decisionModal.jobId).title"></p></div><button type="button" class="text-button" aria-label="Close decision dialog" @click="decisionModal=null"><i class="fa-solid fa-xmark"></i></button></div><div class="field decision-field"><label>Reason category</label><select class="input" x-model="decisionModal.reasonCategory"><option value="requirements">Requirements or scope</option><option value="funding">Funding or headcount</option><option value="governance_risk">Governance risk</option><option value="hiring_intent">Hiring intent changed</option></select></div><div class="field"><label>Required comment</label><textarea required class="input textarea" x-model="decisionModal.comment" placeholder="Explain the decision clearly for the audit record."></textarea></div><div class="listing-actions"><button class="btn" :class="decisionModal.action==='request_changes'?'btn-primary':'btn-danger'" type="submit" x-text="decisionModal.title"></button><button class="btn btn-secondary" type="button" @click="decisionModal=null">Cancel</button></div></form></div>
  </template>

  <div x-show="toast" x-transition class="toast" x-text="toast" role="status" aria-live="polite"></div>
</body>
</html>
