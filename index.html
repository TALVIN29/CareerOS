<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CareerOS Verify | Job Integrity & Active Vacancy Assurance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="./styles.css">
  <script src="./permissions.js"></script>
  <script src="./app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()" x-cloak>
  <template x-if="screen !== 'employer'">
    <div>
      <header class="site-header">
        <div class="max public-nav">
          <button class="brand text-button" @click="navigate('home')">
            <span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span>
            <span>CareerOS <b>Verify</b></span>
          </button>
          <nav class="nav-links" aria-label="Primary navigation">
            <button @click="navigate('home');setTimeout(()=>document.getElementById('how')?.scrollIntoView({behavior:'smooth'}),0)">How It Works</button>
            <button @click="navigate('home');setTimeout(()=>document.getElementById('verified-vacancy')?.scrollIntoView({behavior:'smooth'}),0)">Verified Vacancy</button>
            <button @click="navigate('home');setTimeout(()=>document.getElementById('impact')?.scrollIntoView({behavior:'smooth'}),0)">Network Impact</button>
          </nav>
          <button class="btn btn-primary" @click="navigate('login')">Log In</button>
        </div>
      </header>

      <main x-show="screen === 'home'">
        <section class="hero">
          <div class="max hero-grid">
            <div>
              <h1>Publish roles people can <span>trust.</span></h1>
              <p>Validate every job advertisement, obtain Hiring Manager approval and continuously confirm that the vacancy remains active before candidates invest their time.</p>
              <div class="hero-actions">
                <button class="btn btn-primary" @click="navigate('login')">Log In <i class="fa-solid fa-arrow-right"></i></button>
                <button class="btn btn-secondary" @click="document.getElementById('how')?.scrollIntoView({behavior:'smooth'})">Explore How It Works</button>
              </div>
              <div class="hero-proof">
                <span><i class="fa-solid fa-shield-halved"></i> Every vacancy approved</span>
                <span><i class="fa-solid fa-list-check"></i> Every requirement explainable</span>
                <span><i class="fa-solid fa-clock"></i> Every active role reconfirmed</span>
              </div>
            </div>
            <div class="hero-panel">
              <div class="passport-head"><div><strong>CareerOS Verified Vacancy</strong><div class="muted-line">Backend Engineer · Vertex Digital</div></div><i class="fa-solid fa-shield-halved verify-icon"></i></div>
              <div class="check-row"><span>Demo Verified Employer</span><i class="fa-solid fa-circle-check"></i></div>
              <div class="check-row"><span>Headcount and budget approved</span><i class="fa-solid fa-circle-check"></i></div>
              <div class="check-row"><span>Hiring Manager confirmed</span><i class="fa-solid fa-circle-check"></i></div>
              <div class="check-row"><span>Confirmed active 8 days ago</span><i class="fa-solid fa-circle-check"></i></div>
              <div class="score-line">Job Integrity Score <strong>92 / 100</strong></div>
            </div>
          </div>
        </section>

        <section id="how" class="public-section">
          <div class="max section-grid">
            <div><h2 class="section-title">A job being online does not mean it is real, funded, or still active.</h2><p class="section-copy">CareerOS Verify creates a mandatory integrity gate before publication, then continues checking throughout the vacancy’s lifetime. It protects candidates and the quality of demand signals across Talentbank’s network.</p></div>
            <div class="problem-list"><div class="problem">Candidates waste time applying to stale or misleading opportunities.</div><div class="problem">Recruiters receive unsuitable applications when requirements are inaccurate.</div><div class="problem">Old and unapproved ads distort labour-market insights.</div></div>
          </div>
        </section>

        <section class="public-section">
          <div class="max section-grid">
            <div><h2 class="section-title">Validate. Approve. Publish. Reconfirm.</h2><p class="section-copy">Automated Validation and human Manager Approval are separate, accountable layers.</p></div>
            <div class="workflow">
              <div class="workflow-step"><span class="workflow-n">01</span><div><strong>Run Automated Validation</strong><p>Transparent checks find missing approvals, unrealistic requirements, salary inconsistencies, and incomplete detail.</p></div></div>
              <div class="workflow-step"><span class="workflow-n">02</span><div><strong>Obtain Manager Approval</strong><p>The assigned Hiring Manager attests that the vacancy is approved, funded, and intended to be filled.</p></div></div>
              <div class="workflow-step"><span class="workflow-n">03</span><div><strong>Publish the Verified Vacancy</strong><p>Only approved roles receive a candidate-facing CareerOS Verified Vacancy.</p></div></div>
              <div class="workflow-step"><span class="workflow-n">04</span><div><strong>Reconfirm active hiring</strong><p>Managers reconfirm activity. Unconfirmed roles are automatically paused as stale.</p></div></div>
            </div>
          </div>
        </section>

        <section id="verified-vacancy" class="public-section">
          <div class="max"><h2 class="section-title">The Job Integrity Score is explainable by design.</h2><div class="three-col feature-row"><article class="feature"><i class="fa-solid fa-scale-balanced"></i><h3>Automated Validation</h3><p>Critical blockers, eligibility, and state transitions use transparent rules rather than invented AI percentages.</p></article><article class="feature"><i class="fa-solid fa-magnifying-glass-chart"></i><h3>Evidence-led review</h3><p>Market evidence highlights exceptions clearly, with why they matter and a recommended correction.</p></article><article class="feature"><i class="fa-solid fa-user-check"></i><h3>Human Manager Approval</h3><p>An accountable manager, separate from the recruiter, confirms the vacancy is funded and genuinely intended to be filled.</p></article></div></div>
        </section>

        <section id="impact" class="public-section">
          <div class="max section-grid"><div><h2 class="section-title">A trusted vacancy becomes a trusted demand signal.</h2><p class="section-copy">Only approved, published, and recently confirmed roles contribute to Talentbank’s demand network. Drafts, pending roles, stale jobs, filled jobs, and closed roles are excluded.</p></div><div class="workflow"><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-building"></i></span><div><strong>Employers</strong><p>Clear accountability and fewer unauthorised advertisements.</p></div></div><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-user-check"></i></span><div><strong>Candidates</strong><p>Evidence that a role is approved, realistic, and still active.</p></div></div><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-network-wired"></i></span><div><strong>Talentbank Network</strong><p>Cleaner matching inputs and more reliable demand data.</p></div></div></div></div>
        </section>
        <section class="final-cta"><h2>Make every vacancy accountable before it goes live.</h2><p>Use the role-based demo to experience the Recruiter, Hiring Manager, and HR Administrator responsibilities.</p><button class="btn btn-primary" @click="navigate('login')">Log In <i class="fa-solid fa-arrow-right"></i></button></section>
      </main>

      <main x-show="screen === 'login'" class="auth-wrap">
        <form class="auth-card auth-card-wide" @submit.prevent="login()">
          <button type="button" class="text-button" @click="navigate('home')"><i class="fa-solid fa-arrow-left"></i> Back to Home</button>
          <h1>Log in to CareerOS Verify</h1>
          <p>Use one of the seeded accounts to explore a specific responsibility in the employer workflow.</p>
          <div class="field"><label>Business email</label><input required type="email" x-model="loginEmail" class="input" autocomplete="username"></div>
          <div class="field"><label>Password</label><input required type="password" x-model="loginPassword" class="input" autocomplete="current-password"></div>
          <p x-show="authError" class="form-error" x-text="authError"></p>
          <button class="btn btn-primary full-button">Log In</button>
          <div class="demo-access">
            <h2>Judge demonstration accounts</h2>
            <div class="demo-options">
              <template x-for="user in CareerOSAuth.DEMO_USERS" :key="user.userId">
                <button type="button" class="demo-account" @click="chooseDemo(user)">
                  <span class="demo-account-icon"><i class="fa-solid" :class="user.role === 'recruiter' ? 'fa-pen-to-square' : user.role === 'hiring_manager' ? 'fa-user-check' : 'fa-shield-halved'"></i></span>
                  <span><strong x-text="`Use ${user.roleLabel} Demo`"></strong><small x-text="`${user.name} · ${user.email}`"></small></span>
                </button>
              </template>
            </div>
            <p class="demo-explanation">Demo access allows judges to explore each responsibility. In production, roles would be assigned by an authorised administrator and enforced by the backend.</p>
          </div>
          <p class="auth-switch">Don’t have an account? <button type="button" class="text-button" @click="navigate('signup')">Create account</button></p>
        </form>
      </main>

      <main x-show="screen === 'signup'" class="auth-wrap">
        <section class="auth-card prototype-message">
          <button type="button" class="text-button" @click="navigate('login')"><i class="fa-solid fa-arrow-left"></i> Back to Log In</button>
          <i class="fa-solid fa-building-user prototype-icon"></i>
          <h1>Account creation is simulated</h1>
          <p>In production, an authorised HR Administrator would create your organisation account, verify your identity, and assign your role. Use a demonstration account to continue exploring the prototype.</p>
          <button class="btn btn-primary full-button" @click="navigate('login')">Choose a Demo Account</button>
        </section>
      </main>

      <footer x-show="screen === 'home'" class="footer"><div class="max footer-row"><span>CareerOS Verify · Job Integrity & Active Vacancy Assurance</span><span>Built for trustworthy employer demand signals.</span></div></footer>
    </div>
  </template>

  <template x-if="screen === 'employer' && currentUser">
    <div class="workspace">
      <header class="workspace-top">
        <button class="brand text-button" @click="setPage('overview')"><span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span><span>CareerOS <b>Verify</b></span></button>
        <div class="workspace-actions">
          <div class="user-identity"><strong x-text="currentUser.name"></strong><span x-text="`${currentUser?.roleLabel} · ${currentUser.organisation}`"></span></div>
          <span class="role-badge" x-text="currentUser?.roleLabel"></span>
          <button class="btn btn-secondary btn-small" @click="signOut()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out</button>
        </div>
      </header>

      <div class="workspace-layout">
        <aside class="sidebar" aria-label="Workspace navigation">
          <template x-for="item in navItems()" :key="item.id"><button class="side-button" :class="workspacePage===item.id?'active':''" @click="setPage(item.id)"><i class="fa-solid" :class="item.icon"></i><span x-text="item.label"></span></button></template>
          <div class="sidebar-account"><span>Signed in as</span><strong x-text="currentUser.email"></strong><small x-text="currentUser.departmentScope || currentUser.department"></small></div>
        </aside>

        <main class="workspace-main">
          <section x-show="workspacePage === 'overview'">
            <div class="page-heading"><div><span class="responsibility-label" x-text="currentUser?.roleLabel"></span><h1 x-text="dashboardCopy().title"></h1><p>Automated Validation and Manager Approval remain separate, visible, and auditable.</p></div><div class="heading-actions"><button x-show="currentUser?.role === 'recruiter'" class="btn btn-primary" @click="startJob()"><i class="fa-solid fa-plus"></i> Create Job</button><button x-show="currentUser?.role === 'hiring_manager'" class="btn btn-primary" @click="setPage('approvals')">Review Approval Queue</button><button x-show="currentUser?.role === 'hr_admin'" class="btn btn-primary" @click="setPage('audit')">Open Audit Log</button></div></div>
            <div class="metric-grid role-metrics"><template x-for="card in overviewCards()" :key="card[0]"><article class="metric"><span x-text="card[0]"></span><strong x-text="card[1]"></strong></article></template></div>
            <div class="panel action-required">
              <div class="action-intro"><i class="fa-solid fa-list-check"></i><h2 x-text="currentUser?.role === 'hr_admin' ? 'Governance alerts' : 'Your next decisions'"></h2><p x-text="currentUser?.role === 'recruiter' ? 'Keep your vacancies moving without crossing the Manager Approval boundary.' : currentUser?.role === 'hiring_manager' ? 'Your decisions protect candidates from unapproved or abandoned vacancies.' : 'Focus on exceptions, overdue activity, and organisation-wide integrity.'"></p></div>
              <div class="action-list"><template x-for="job in actionJobs()" :key="job.id"><button class="action-row action-button" @click="openAction(job)"><span><strong x-text="nextAction(job)"></strong><small x-text="`${job.title} · ${job.status}`"></small></span><i class="fa-solid fa-chevron-right"></i></button></template><div x-show="!actionJobs().length" class="empty compact-empty">No actions require attention.</div></div>
            </div>
            <div class="panel lifecycle-panel"><div><span class="layer-number">1</span><strong>Automated Validation</strong><p>CareerOS analyses requirements, salary realism, clarity, and policy inconsistencies.</p></div><i class="fa-solid fa-arrow-right"></i><div><span class="layer-number">2</span><strong>Human Manager Approval</strong><p>The assigned manager confirms funding, intent, and departmental accuracy.</p></div></div>
          </section>

          <section x-show="workspacePage === 'create'">
            <div class="page-heading"><div><h1>Create Job</h1><p>Recruiters prepare the evidence. Only the assigned Hiring Manager can provide business approval.</p></div><button class="btn btn-secondary btn-small" @click="saveDraft()">Save Draft</button></div>
            <div class="split">
              <div class="panel">
                <div class="wizard-steps"><template x-for="[number,label] in [[1,'1. Vacancy Approval'],[2,'2. Role Details'],[3,'3. Requirements'],[4,'4. Automated Validation']]" :key="number"><button :class="wizardStep===number?'active':''" @click="wizardStep=number" x-text="label"></button></template></div>
                <div x-show="wizardStep===1" class="form-grid">
                  <div class="field"><label>Requisition ID</label><input class="input" x-model="draft.requisitionId" placeholder="REQ-2026-0150"></div>
                  <div class="field"><label>Department</label><input class="input" x-model="draft.department"></div>
                  <div class="field"><label>Recruiter</label><input class="input locked-input" :value="currentUser.name" disabled></div>
                  <div class="field"><label>Assigned Hiring Manager</label><select class="input" x-model="draft.assignedManagerId" @change="draft.hiringManager = CareerOSAuth.DEMO_USERS.find(u=>u.userId===draft.assignedManagerId)?.name || ''"><option :value="CareerOSAuth.DEMO_USERS.find(u=>u.role==='hiring_manager').userId">Daniel Lee · Technology</option></select></div>
                  <div class="field"><label>Headcount approved</label><select class="input" x-model.boolean="draft.headcountApproved"><option :value="false">No</option><option :value="true">Yes</option></select></div>
                  <div class="field"><label>Budget approved</label><select class="input" x-model.boolean="draft.budgetApproved"><option :value="false">No</option><option :value="true">Yes</option></select></div>
                  <div class="field full"><label>Business justification</label><textarea class="input textarea" x-model="draft.businessJustification" placeholder="Why is this vacancy required now?"></textarea></div>
                </div>
                <div x-show="wizardStep===2" class="form-grid">
                  <div class="field"><label>Job title</label><input class="input" x-model="draft.title" placeholder="e.g. Data Analyst"></div>
                  <div class="field"><label>Location</label><input class="input" x-model="draft.location"></div>
                  <div class="field"><label>Workplace arrangement</label><select class="input" x-model="draft.workplace"><option>Hybrid</option><option>On-site</option><option>Remote</option></select></div>
                  <div class="field"><label>Employment type</label><select class="input" x-model="draft.employmentType"><option>Full-time</option><option>Part-time</option><option>Contract</option><option>Internship</option></select></div>
                  <div class="field"><label>Seniority</label><select class="input" x-model="draft.seniority"><option>Entry level</option><option>Mid level</option><option>Senior</option><option>Director</option><option>Internship</option></select></div>
                  <div class="field"><label>Salary visibility</label><select class="input" x-model.boolean="draft.salaryVisible"><option :value="true">Visible to candidates</option><option :value="false">Hidden</option></select></div>
                  <div class="field"><label>Minimum salary</label><input type="number" class="input" x-model.number="draft.salaryMin"></div>
                  <div class="field"><label>Maximum salary</label><input type="number" class="input" x-model.number="draft.salaryMax"></div>
                  <div class="field full"><label>Job summary</label><textarea class="input textarea" x-model="draft.summary"></textarea></div>
                  <div class="field full"><label>Responsibilities</label><textarea class="input textarea" x-model="draft.responsibilities"></textarea></div>
                </div>
                <div x-show="wizardStep===3"><div class="page-heading"><div><h2>Requirements</h2><p>Add only requirements that are genuinely necessary.</p></div><button class="btn btn-secondary btn-small" @click="addRequirement()"><i class="fa-solid fa-plus"></i> Add requirement</button></div><template x-for="(requirement,index) in draft.requirements" :key="index"><div class="requirement"><div class="field"><label>Requirement</label><input class="input" x-model="requirement.name"></div><div class="field"><label>Type</label><select class="input" x-model="requirement.type"><option>Technical</option><option>Soft skill</option><option>Education</option></select></div><div class="field"><label>Priority</label><select class="input" x-model.boolean="requirement.required"><option :value="true">Required</option><option :value="false">Preferred</option></select></div><div class="field"><label>Min. years</label><input type="number" min="0" class="input" x-model.number="requirement.years"></div><div class="field"><label>Justification</label><input class="input" x-model="requirement.justification"></div><button class="btn btn-secondary btn-small remove" @click="removeRequirement(index)" aria-label="Remove requirement"><i class="fa-solid fa-trash"></i></button></div></template></div>
                <div x-show="wizardStep===4"><div class="page-heading"><div><h2>Automated Validation</h2><p>This analysis does not approve the vacancy. It prepares evidence for the assigned manager.</p></div><button class="btn btn-primary btn-small" @click="validate(draft)"><i class="fa-solid fa-shield-halved"></i> Run Automated Validation</button></div><div class="review-score"><span>Job Integrity Score</span><strong :class="scoreClass(draft.score)" x-text="`${draft.score} / 100`"></strong><p x-text="draft.score>=80?'Strong evidence for Manager Approval':draft.score>=60?'Review warnings before submission':'Changes required before submission'"></p></div><div class="validation-list validation-spacing"><template x-if="!validationRan"><div class="issue"><h4>Validation has not run</h4><p>Run Automated Validation to see policy checks and market evidence.</p></div></template><template x-for="issue in draft.blockers" :key="issue"><div class="issue critical"><h4>Critical blocker · Automated Validation</h4><p x-text="issue"></p></div></template><template x-for="issue in draft.warnings" :key="issue"><div class="issue warning"><h4>Warning · Market Evidence</h4><p x-text="issue"></p></div></template><template x-for="pass in draft.passed" :key="pass"><div class="issue pass"><h4>Passed check</h4><p x-text="pass"></p></div></template></div></div>
                <div class="wizard-footer"><button class="btn btn-secondary" @click="wizardStep=Math.max(1,wizardStep-1)">Previous</button><div><button class="btn btn-secondary" @click="saveDraft()">Save Draft</button><button x-show="wizardStep<4" class="btn btn-primary" @click="wizardStep++">Continue</button><button x-show="wizardStep===4" class="btn btn-primary" @click="submitForApproval()">Submit for Manager Approval</button></div></div>
              </div>
              <aside class="panel side-note"><h3>Two distinct gates</h3><div class="legend"><div><i class="fa-solid fa-shield-halved validation-icon"></i><span><strong>Automated Validation</strong><small>CareerOS evidence and policy checks.</small></span></div><div><i class="fa-solid fa-user-check manager-icon"></i><span><strong>Manager Approval</strong><small>Human funding and hiring-intent decision.</small></span></div></div></aside>
            </div>
          </section>

          <section x-show="workspacePage === 'approvals'">
            <div class="page-heading"><div><h1 x-text="currentUser?.role === 'recruiter' ? 'Submitted for Approval' : currentUser?.role === 'hiring_manager' ? 'Approval Queue' : 'Approval Oversight'"></h1><p x-text="currentUser?.role === 'recruiter' ? 'Track Manager Approval without crossing the decision boundary.' : currentUser?.role === 'hiring_manager' ? 'Review Automated Validation evidence before making a human business decision.' : 'Monitor approval delays and exceptions across the organisation.'"></p></div><span class="role-badge" x-text="currentUser?.roleLabel"></span></div>
            <div class="panel table-wrap"><table class="table"><thead><tr><th>Role</th><th>Recruiter</th><th>Assigned Manager</th><th>Validation</th><th>Status</th><th>Actions</th></tr></thead><tbody><template x-for="job in approvalJobs()" :key="job.id"><tr><td><strong x-text="job.title"></strong><small class="table-sub" x-text="job.department"></small></td><td x-text="job.recruiter"></td><td x-text="job.hiringManager"></td><td><strong :class="scoreClass(job.score)" x-text="`${job.score}/100`"></strong><small class="table-sub" x-text="job.warnings.length ? `${job.warnings.length} warning(s)` : 'Checks passed'"></small></td><td><span class="status" :class="statusClass(job.status)" x-text="job.status"></span></td><td><div class="listing-actions"><button class="btn btn-secondary btn-small" @click="activeJobId=job.id">View Submission</button><button x-show="currentUser?.role==='recruiter' && job.status==='Pending Approval'" class="btn btn-secondary btn-small" @click="withdraw(job)">Withdraw</button></div></td></tr></template></tbody></table><div x-show="!approvalJobs().length" class="empty">No submissions are available in your scope.</div></div>

            <article x-show="activeJobId && job(activeJobId)" class="panel submission-review">
              <div class="page-heading"><div><span class="responsibility-label">Job Evidence</span><h2 x-text="job(activeJobId)?.title"></h2><p x-text="`Submitted by ${job(activeJobId)?.recruiter} to ${job(activeJobId)?.hiringManager}`"></p></div><span class="status" :class="statusClass(job(activeJobId)?.status)" x-text="job(activeJobId)?.status"></span></div>
              <div class="evidence-grid">
                <div class="evidence-block"><span>Automated Validation score</span><strong :class="scoreClass(job(activeJobId)?.score)" x-text="`${job(activeJobId)?.score} / 100`"></strong><small>CareerOS policy and market analysis</small></div>
                <div class="evidence-block"><span>Salary evidence</span><strong x-text="`${job(activeJobId)?.currency} ${Number(job(activeJobId)?.salaryMin).toLocaleString()}–${Number(job(activeJobId)?.salaryMax).toLocaleString()}`"></strong><small>Compared with demonstration market benchmarks</small></div>
                <div class="evidence-block"><span>Submission date</span><strong x-text="formatDate(job(activeJobId)?.submittedAt)"></strong><small x-text="`${daysAgo(job(activeJobId)?.submittedAt)} day(s) in queue`"></small></div>
              </div>
              <div class="review-columns">
                <div><h3>Validation result breakdown</h3><div class="validation-list"><template x-for="issue in job(activeJobId)?.warnings || []" :key="issue"><div class="issue warning"><h4>Outstanding warning</h4><p x-text="issue"></p></div></template><template x-for="pass in job(activeJobId)?.passed || []" :key="pass"><div class="issue pass"><h4>Passed check</h4><p x-text="pass"></p></div></template><div x-show="!(job(activeJobId)?.warnings?.length || job(activeJobId)?.passed?.length)" class="empty compact-empty">No validation evidence recorded.</div></div></div>
                <div><h3>Recruiter explanations and history</h3><div class="validation-list"><template x-for="explanation in job(activeJobId)?.recruiterExplanations || []" :key="explanation"><div class="issue"><h4>Recruiter explanation</h4><p x-text="explanation"></p></div></template><template x-for="event in audit.filter(event=>event.jobId===activeJobId).slice(0,5)" :key="event.id"><div class="issue"><h4 x-text="event.action"></h4><p x-text="`${event.actor} · ${formatDateTime(event.at)}`"></p><small x-text="event.comment"></small></div></template></div></div>
              </div>
              <div class="job-preview"><h3>Full job preview</h3><p x-text="job(activeJobId)?.summary"></p><p x-text="job(activeJobId)?.responsibilities"></p><div class="requirement-tags"><template x-for="requirement in job(activeJobId)?.requirements || []" :key="requirement.name"><span x-text="`${requirement.name} · ${requirement.years} yrs`"></span></template></div></div>
              <div x-show="currentUser?.role === 'hiring_manager' && job(activeJobId)?.status === 'Pending Approval'" class="manager-decision">
                <h3>Human Manager Approval</h3>
                <label class="attestation"><input type="checkbox" x-model="managerAttests"><span>I confirm that this vacancy is approved, funded, genuinely intended to be filled, and accurately represents my department’s needs.</span></label>
                <div class="listing-actions"><button class="btn btn-primary" :disabled="!managerAttests" @click="approve(job(activeJobId))">Approve</button><button class="btn btn-secondary" @click="requestChanges(job(activeJobId))">Request Changes</button><button class="btn btn-danger" @click="reject(job(activeJobId))">Reject</button></div>
              </div>
              <div x-show="currentUser?.role === 'recruiter' && job(activeJobId)?.status === 'Pending Approval'" class="boundary-note"><i class="fa-solid fa-lock"></i><span><strong>Submitted to Daniel Lee for approval.</strong> Approval, rejection, and managerial attestation are intentionally unavailable to Recruiters.</span></div>
              <div x-show="job(activeJobId)?.status === 'Approved'" class="boundary-note success-note"><i class="fa-solid fa-circle-check"></i><span><strong x-text="`Approved by ${job(activeJobId)?.managerDecision?.managerName || 'Daniel Lee'} on ${formatDate(job(activeJobId)?.approvalTimestamp)}.`"></strong> Ready for the assigned Recruiter to publish.</span></div>
            </article>
          </section>

          <section x-show="workspacePage === 'listings'">
            <div class="page-heading"><div><h1 x-text="currentUser?.role === 'recruiter' ? 'My Job Listings' : currentUser?.role === 'hiring_manager' ? 'Team Vacancies' : 'All Job Listings'"></h1><p>Each role sees only the records and actions assigned to its responsibility.</p></div><button x-show="currentUser?.role==='recruiter'" class="btn btn-primary" @click="startJob()"><i class="fa-solid fa-plus"></i> Create Job</button></div>
            <div class="panel table-wrap"><table class="table"><thead><tr><th>Role</th><th>Department</th><th>Recruiter / Manager</th><th>Score</th><th>Freshness</th><th>Status</th><th>Allowed Actions</th></tr></thead><tbody><template x-for="job in visibleJobs()" :key="job.id"><tr><td><strong x-text="job.title"></strong><small class="table-sub" x-text="job.requisitionId || 'No requisition ID'"></small></td><td x-text="job.department"></td><td><span x-text="job.recruiter"></span><small class="table-sub" x-text="job.hiringManager"></small></td><td :class="scoreClass(job.score)" x-text="`${job.score}/100`"></td><td x-text="job.freshnessStatus"></td><td><span class="status" :class="statusClass(job.status)" x-text="job.status"></span></td><td><div class="listing-actions"><button x-show="can('edit_own_job',job)" class="btn btn-secondary btn-small" @click="startJob(job)">Edit</button><button x-show="currentUser?.role==='recruiter' && ['Draft','Needs Changes'].includes(job.status)" class="btn btn-secondary btn-small" @click="validate(job)">Run Validation</button><button x-show="job.status==='Pending Approval'" class="btn btn-secondary btn-small" @click="setPage('approvals');activeJobId=job.id">View Submission</button><button x-show="can('publish_approved_job',job)" class="btn btn-primary btn-small" @click="publish(job)">Publish</button><button x-show="currentUser?.role==='recruiter' && job.status==='Published'" class="btn btn-secondary btn-small" @click="candidatePreviewJobId=job.id">Preview Candidate View</button><button x-show="can('reconfirm_active_vacancy',job) && ['Confirmation Due','Paused as Stale'].includes(job.status)" class="btn btn-primary btn-small" @click="freshnessJobId=job.id">Review Hiring Status</button><button x-show="currentUser?.role==='hr_admin' && can('pause_suspicious_job',job)" class="btn btn-danger btn-small" @click="setLifecycle(job,'pause')">Pause with Reason</button></div></td></tr></template></tbody></table><div x-show="!visibleJobs().length" class="empty">No job records are available in your authorised scope.</div></div>
          </section>

          <section x-show="workspacePage === 'evidence'">
            <div class="page-heading"><div><h1>Market Evidence</h1><p>Transparent benchmarks support Automated Validation but never replace Manager Approval.</p></div><span class="status status-amber">Demonstration Market Benchmark</span></div>
            <div class="three-col"><div class="panel"><h3>Comparable advertisements</h3><strong class="evidence-number">38</strong><p class="muted-copy">Cached evidence for comparable technology and data roles in Malaysia and Singapore.</p></div><div class="panel"><h3>Experience pattern</h3><strong class="evidence-value">0–2 years</strong><p class="muted-copy">Typical entry-level benchmark. Requests above three years are highlighted.</p></div><div class="panel"><h3>Salary range</h3><strong class="evidence-value">MYR 42k–65k</strong><p class="muted-copy">Salary exceptions are flagged for review, not automatically rejected.</p></div></div>
            <div class="panel panel-spacing"><h2>Evidence classification</h2><div class="validation-list validation-spacing"><div class="issue"><h4>Demonstration Market Benchmark</h4><p>Seeded benchmark data used when a live market source is not connected.</p></div><div class="issue"><h4>Limited Evidence</h4><p>CareerOS keeps validation and approval usable when external evidence is incomplete.</p></div></div></div>
          </section>

          <section x-show="workspacePage === 'impact'">
            <div class="page-heading"><div><h1>Network Impact</h1><p>Only active, approved, and recently confirmed vacancies become trusted demand signals.</p></div><span class="status status-green">Trusted demand service</span></div>
            <div class="impact-grid"><div class="impact-number"><strong x-text="jobs.length"></strong><span>Organisation vacancies</span></div><div class="impact-number"><strong x-text="trustedJobs().length"></strong><span>Active verified jobs</span></div><div class="impact-number"><strong x-text="counts(jobs)['Confirmation Due'] || 0"></strong><span>Confirmation requests due</span></div><div class="impact-number"><strong x-text="counts(jobs)['Paused as Stale'] || 0"></strong><span>Stale jobs paused</span></div></div>
            <div class="panel panel-spacing"><h2>Verified skills demand</h2><p class="muted-copy">Draft, pending, stale, and filled jobs are excluded.</p><div class="validation-list validation-spacing"><template x-for="[skill,count] in demandSkills()" :key="skill"><div class="issue pass"><h4 x-text="skill"></h4><p x-text="`${count} active verified vacancy requesting this skill.`"></p></div></template></div></div>
          </section>

          <section x-show="workspacePage === 'audit'">
            <div class="page-heading"><div><h1 x-text="currentUser?.role === 'recruiter' ? 'My Audit History' : currentUser?.role === 'hiring_manager' ? 'Team Audit History' : 'Organisation Audit Log'"></h1><p>Material actions include the actor, assigned responsibility, job, timestamp, transition, and reason.</p></div><span class="role-badge" x-text="currentUser?.roleLabel"></span></div>
            <div class="panel table-wrap"><table class="table"><thead><tr><th>Timestamp</th><th>Actor</th><th>Role</th><th>Action</th><th>Job</th><th>Transition</th><th>Comment / Reason</th></tr></thead><tbody><template x-for="event in scopedAudit()" :key="event.id"><tr><td x-text="formatDateTime(event.at)"></td><td x-text="event.actor"></td><td x-text="event.actorRole"></td><td><strong x-text="event.action"></strong></td><td x-text="event.job"></td><td x-text="event.from || event.to ? `${event.from || '—'} → ${event.to || '—'}` : '—'"></td><td x-text="event.comment || '—'"></td></tr></template></tbody></table><div x-show="!scopedAudit().length" class="empty">No audit activity exists in your authorised scope.</div></div>
          </section>

          <section x-show="workspacePage === 'settings'">
            <div class="page-heading"><div><h1>Governance Settings</h1><p>HR Administrator-only demonstration controls and role assignments.</p></div></div>
            <div class="settings-grid">
              <div class="panel"><h2>Policy thresholds</h2><div class="field"><label>Vacancy confirmation interval (days)</label><input type="number" class="input" x-model.number="policy.confirmationDays"></div><div class="field"><label>Approval service level (days)</label><input type="number" class="input" x-model.number="policy.approvalSlaDays"></div><div class="field"><label>Minimum validation score</label><input type="number" class="input" x-model.number="policy.minimumValidationScore"></div><button class="btn btn-primary" @click="savePolicy()">Save Policy Settings</button></div>
              <div class="panel"><h2>Users and assigned roles</h2><div class="user-list"><template x-for="user in CareerOSAuth.DEMO_USERS" :key="user.userId"><div class="user-row"><span><strong x-text="user.name"></strong><small x-text="user.email"></small></span><span class="role-badge" x-text="user.roleLabel"></span></div></template></div><p class="muted-copy">Roles are shown for governance visibility. They cannot be changed by users inside the workspace.</p></div>
              <div class="panel danger-panel"><h2>Reset demonstration</h2><p class="muted-copy">Restore all connected lifecycle scenarios and audit events.</p><button class="btn btn-secondary" @click="resetDemo()">Reset Demonstration Data</button></div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </template>

  <template x-if="freshnessJobId && job(freshnessJobId)">
    <div class="modal-bg"><article class="modal"><div class="modal-header"><div><span class="responsibility-label">Active-Hiring Confirmation</span><h2 x-text="job(freshnessJobId).title"></h2><p class="muted-line">Is this vacancy still actively being filled?</p></div><button class="text-button" aria-label="Close active-hiring confirmation" @click="freshnessJobId=null"><i class="fa-solid fa-xmark"></i></button></div><div class="passport-grid"><div class="passport-item"><span>Current status</span><strong x-text="job(freshnessJobId).status"></strong></div><div class="passport-item"><span>Last confirmed active</span><strong x-text="`${daysAgo(job(freshnessJobId).lastConfirmedAt)} days ago`"></strong></div><div class="passport-item"><span>Confirmation deadline</span><strong x-text="formatDate(job(freshnessJobId).confirmationDueAt)"></strong></div><div class="passport-item"><span>Assigned decision owner</span><strong x-text="job(freshnessJobId).hiringManager"></strong></div></div><div class="listing-actions modal-actions"><button class="btn btn-primary" @click="confirmHiring(job(freshnessJobId))">Confirm Still Hiring</button><button class="btn btn-secondary" @click="setLifecycle(job(freshnessJobId),'filled')">Mark as Filled</button><button class="btn btn-danger" @click="setLifecycle(job(freshnessJobId),'pause')">Pause Vacancy</button></div></article></div>
  </template>

  <template x-if="candidatePreviewJobId && job(candidatePreviewJobId)">
    <div class="modal-bg"><article class="modal"><div class="modal-header"><div><span class="responsibility-label">CareerOS Verified Vacancy</span><h2 x-text="job(candidatePreviewJobId).title"></h2><p class="muted-line">Candidate-facing verification preview</p></div><button class="text-button" aria-label="Close candidate preview" @click="candidatePreviewJobId=null"><i class="fa-solid fa-xmark"></i></button></div><div class="passport-grid"><div class="passport-item"><span>Employer verification</span><strong>Demo Verified Employer</strong></div><div class="passport-item"><span>Job Integrity Score</span><strong x-text="`${job(candidatePreviewJobId).score} / 100`"></strong></div><div class="passport-item"><span>Manager Approval</span><strong x-text="`Approved by ${job(candidatePreviewJobId).managerDecision?.managerName || job(candidatePreviewJobId).hiringManager}`"></strong></div><div class="passport-item"><span>Publication date</span><strong x-text="formatDate(job(candidatePreviewJobId).publishedAt)"></strong></div><div class="passport-item"><span>Last confirmed active</span><strong x-text="`${daysAgo(job(candidatePreviewJobId).lastConfirmedAt)} days ago`"></strong></div><div class="passport-item"><span>Next confirmation date</span><strong x-text="formatDate(job(candidatePreviewJobId).confirmationDueAt)"></strong></div></div><p class="candidate-note">Candidates see safe trust signals only. Budget details, contact information, internal comments, and business justification remain private.</p></article></div>
  </template>

  <div x-show="toast" x-transition class="toast" x-text="toast" role="status" aria-live="polite"></div>
</body>
</html>
