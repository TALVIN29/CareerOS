<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CareerOS Verify | Job Integrity & Active Vacancy Assurance</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="./styles.css"><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script><script src="./app.js"></script></head>
<body x-data="app()" x-init="init()" x-cloak>
<template x-if="screen !== 'employer'"><div><header class="site-header"><div class="max public-nav"><button class="brand text-button" @click="navigate('home')"><span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span><span>CareerOS <b>Verify</b></span></button><nav class="nav-links"><button @click="navigate('home');setTimeout(()=>document.getElementById('how')?.scrollIntoView({behavior:'smooth'}),0)">How It Works</button><button @click="navigate('home');setTimeout(()=>document.getElementById('verified-vacancy')?.scrollIntoView({behavior:'smooth'}),0)">Verified Vacancy</button><button @click="navigate('home');setTimeout(()=>document.getElementById('impact')?.scrollIntoView({behavior:'smooth'}),0)">Network Impact</button></nav><button class="btn btn-primary" @click="navigate('login')">Log In</button></div></header>
<main x-show="screen === 'home'"><section class="hero"><div class="max hero-grid"><div><h1>Publish roles people can <span>trust.</span></h1><p>Validate every job advertisement, obtain hiring-manager approval and continuously confirm that the vacancy remains active before candidates invest their time.</p><div class="hero-actions"><button class="btn btn-primary" @click="navigate('login')">Log In <i class="fa-solid fa-arrow-right"></i></button><button class="btn btn-secondary" @click="document.getElementById('how')?.scrollIntoView({behavior:'smooth'})">Explore How It Works</button></div><div class="hero-proof"><span><i class="fa-solid fa-shield-halved"></i> Every vacancy approved</span><span><i class="fa-solid fa-list-check"></i> Every requirement explainable</span><span><i class="fa-solid fa-clock"></i> Every active role reconfirmed</span></div></div><div class="hero-panel"><div class="passport-head"><div><strong>CareerOS Verified Vacancy</strong><div style="color:#a3a3aa;margin-top:4px">Backend Engineer · Talentbank Demo</div></div><i class="fa-solid fa-shield-halved verify-icon"></i></div><div class="check-row"><span>Demo Verified Employer</span><i class="fa-solid fa-circle-check"></i></div><div class="check-row"><span>Headcount and budget approved</span><i class="fa-solid fa-circle-check"></i></div><div class="check-row"><span>Hiring manager confirmed</span><i class="fa-solid fa-circle-check"></i></div><div class="check-row"><span>Confirmed active 3 days ago</span><i class="fa-solid fa-circle-check"></i></div><div style="margin-top:18px;color:#fdcaca">Job Integrity Score <strong style="float:right;font-size:25px">92 / 100</strong></div></div></div></section>
<section id="how" class="public-section"><div class="max section-grid"><div><h2 class="section-title">A job being online does not mean it is real, funded, or still active.</h2><p class="section-copy">CareerOS Verify creates a mandatory integrity gate before publication, then continues checking throughout the vacancy’s lifetime. It protects candidates, recruiters, hiring managers, and the quality of demand signals across Talentbank’s network.</p></div><div class="problem-list"><div class="problem">Candidates waste time applying to stale or misleading opportunities.</div><div class="problem">Recruiters receive unsuitable applications when requirements are inaccurate.</div><div class="problem">Old and unapproved ads distort labour-market insights.</div></div></div></section>
<section class="public-section"><div class="max section-grid"><div><h2 class="section-title">Validate. Approve. Publish. Reconfirm.</h2><p class="section-copy">A clear human-controlled workflow makes every decision visible and explainable.</p></div><div class="workflow"><div class="workflow-step"><span class="workflow-n">01</span><div><strong>Validate the draft</strong><p>Deterministic checks find missing approvals, unrealistic requirements, salary inconsistencies, risky content, and incomplete detail.</p></div></div><div class="workflow-step"><span class="workflow-n">02</span><div><strong>Obtain manager approval</strong><p>The assigned hiring manager attests that the vacancy is approved, funded, and intended to be filled.</p></div></div><div class="workflow-step"><span class="workflow-n">03</span><div><strong>Publish the Verified Vacancy</strong><p>Only approved roles receive a candidate-facing CareerOS Verified Vacancy.</p></div></div><div class="workflow-step"><span class="workflow-n">04</span><div><strong>Reconfirm active hiring</strong><p>After publication, managers reconfirm activity. Unconfirmed roles are automatically paused as stale.</p></div></div></div></div></section>
<section id="verified-vacancy" class="public-section"><div class="max"><h2 class="section-title">The Job Integrity Score is explainable by design.</h2><div class="three-col" style="margin-top:28px"><article class="feature"><i class="fa-solid fa-scale-balanced"></i><h3>Deterministic eligibility</h3><p>Critical blockers, approval eligibility, publication gates, and state transitions use transparent rules, not invented AI percentages.</p></article><article class="feature"><i class="fa-solid fa-magnifying-glass-chart"></i><h3>Evidence-led review</h3><p>Market evidence and semantic checks flag exceptions clearly, with why they matter and a recommended correction.</p></article><article class="feature"><i class="fa-solid fa-id-card"></i><h3>Candidate-facing proof</h3><p>Candidate-facing verification shares only safe trust signals: approval, requirements review, salary review, integrity score, and active confirmation.</p></article></div></div></section>
<section id="impact" class="public-section"><div class="max section-grid"><div><h2 class="section-title">A trusted vacancy becomes a trusted demand signal.</h2><p class="section-copy">Only approved, published, and recently confirmed roles contribute to Talentbank’s demand network. Drafts, pending roles, stale jobs, filled jobs, and closed roles are excluded.</p></div><div class="workflow"><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-building"></i></span><div><strong>Employers</strong><p>Clear accountability, fewer unauthorised advertisements, and better-quality applications.</p></div></div><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-user-check"></i></span><div><strong>Candidates</strong><p>Evidence that the role is approved, realistic, and still actively hiring.</p></div></div><div class="workflow-step"><span class="workflow-n"><i class="fa-solid fa-network-wired"></i></span><div><strong>Talentbank Network</strong><p>Cleaner matching inputs and more reliable employer-demand data.</p></div></div></div></div></section>
<section class="final-cta"><h2>Make every vacancy accountable before it goes live.</h2><p>Log in to validate job advertisements, obtain manager approval and maintain an auditable record throughout the vacancy lifecycle.</p><button class="btn btn-primary" @click="navigate('login')">Log In <i class="fa-solid fa-arrow-right"></i></button></section></main>
<main x-show="screen === 'login' || screen === 'signup'" class="auth-wrap"><form class="auth-card" @submit.prevent="enterWorkspace('overview', screen === 'signup')"><button type="button" class="text-button" @click="screen === 'signup' ? navigate('login') : navigate('home')"><i class="fa-solid fa-arrow-left"></i> <span x-text="screen === 'signup' ? 'Back to Log In' : 'Back to Home'"></span></button><h1 x-text="screen === 'login' ? 'Log in to CareerOS Verify' : 'Create an employer account'"></h1><p x-text="screen === 'login' ? 'This presentation screen opens the seeded Employer Workspace. No credentials are stored.' : 'Set up your organisation’s CareerOS Verify workspace.'"></p><template x-if="screen === 'signup'"><div><div class="field"><label>Organisation name</label><input required class="input" placeholder="Organisation name"></div><div class="field"><label>Full name</label><input required class="input" placeholder="Your name"></div><div class="field"><label>Job title</label><input required class="input" placeholder="Your job title"></div><div class="field"><label>Organisation size</label><select required class="input"><option value="">Select organisation size</option><option>1–50 employees</option><option>51–200 employees</option><option>201–1,000 employees</option><option>1,000+ employees</option></select></div></div></template><div class="field"><label>Business email</label><input required type="email" x-model="loginEmail" class="input" placeholder="recruiter@careeros.demo"></div><div class="field"><label>Password</label><input required type="password" class="input" value="demo123" autocomplete="off"></div><template x-if="screen === 'signup'"><div class="field"><label>Confirm password</label><input required type="password" class="input" autocomplete="off"></div></template><template x-if="screen === 'login'"><label class="checkbox"><input type="checkbox"> Remember me</label></template><button class="btn btn-primary" style="width:100%" x-text="screen === 'login' ? 'Log In' : 'Create Account'"></button><p style="text-align:center;margin:18px 0 0;color:#9ca3af" x-show="screen === 'login'">Don’t have an account? <button type="button" class="text-button" @click="navigate('signup')">Create account</button></p><p style="text-align:center;margin:18px 0 0;color:#9ca3af" x-show="screen === 'signup'">Already have an account? <button type="button" class="text-button" @click="navigate('login')">Log in</button></p></form></main>
<footer x-show="screen === 'home'" class="footer"><div class="max" style="display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap"><span>CareerOS Verify · Job Integrity & Active Vacancy Assurance</span><span>Built for trustworthy employer demand signals.</span></div></footer></div></template>
<template x-if="screen === 'employer'"><div class="workspace"><header class="workspace-top"><button class="brand text-button" @click="navigate('home')"><span class="brand-mark"><i class="fa-solid fa-shield-halved"></i></span><span>CareerOS <b>Verify</b></span></button><div class="workspace-actions"><span style="color:#b9b9c1" class="hide-mobile">Talentbank Demo</span><label class="demo-role">Demo Role<select x-model="role" @change="addAudit('Demo role switched',null,'','',`Role set to ${role}.`);persist()"><option>Recruiter</option><option>Hiring Manager</option><option>HR Administrator</option></select></label><span class="demo-pill">● DEMO MODE</span><button class="text-button" @click="logOut()" aria-label="Log out and return to home"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</button></div></header><div class="workspace-layout"><aside class="sidebar"><template x-for="item in [{id:'overview',label:'Overview',icon:'fa-chart-line'},{id:'create',label:'Create Job',icon:'fa-plus-square'},{id:'approvals',label:'Approvals',icon:'fa-clipboard-check'},{id:'listings',label:'Job Listings',icon:'fa-briefcase'},{id:'evidence',label:'Market Evidence',icon:'fa-chart-column'},{id:'impact',label:'Network Impact',icon:'fa-network-wired'},{id:'audit',label:'Audit Log',icon:'fa-file-lines'},{id:'settings',label:'Settings',icon:'fa-gear'}]" :key="item.id"><button class="side-button" :class="workspacePage===item.id?'active':''" @click="setPage(item.id)"><i class="fa-solid" :class="item.icon"></i><span x-text="item.label"></span></button></template></aside><main class="workspace-main">
<section x-show="workspacePage==='overview'"><div class="page-heading"><div><h1>Overview</h1><p>Keep every vacancy trustworthy throughout its entire lifetime.</p></div><button class="btn btn-secondary btn-small" @click="advanceTime()"><i class="fa-solid fa-forward"></i> Advance Demo Time</button></div><div class="metric-grid"><template x-for="item in [['Draft','Drafts'],['Needs Changes','Needs Changes'],['Pending Approval','Pending Approval'],['Approved','Approved'],['Published','Published'],['Confirmation Due','Confirmation Due'],['Paused as Stale','Paused as Stale']]" :key="item[0]"><div class="metric"><span x-text="item[1]"></span><strong x-text="counts()[item[0]]"></strong></div></template></div><div class="panel action-required"><div class="action-intro"><i class="fa-solid fa-clipboard-list"></i><h2>Action Required</h2><p>Jobs that need attention to preserve verification integrity and active vacancy assurance.</p><button class="btn btn-secondary btn-small" @click="setPage('approvals')">Review approvals</button></div><div class="action-list"><template x-for="job in actionJobs().slice(0,5)" :key="job.id"><div class="action-row"><strong x-text="job.status"></strong><span x-text="job.title"></span><button class="text-button" @click="activeJobId=job.id;setPage(job.status==='Pending Approval'?'approvals':'listings')"><i class="fa-solid fa-chevron-right"></i></button></div></template></div></div><div class="panel table-wrap"><div class="table-top"><h2>Recent jobs</h2><button class="btn btn-secondary btn-small" @click="setPage('listings')">View all job listings</button></div><table class="table"><thead><tr><th>Role</th><th>Department</th><th>Recruiter</th><th>Hiring manager</th><th>Integrity score</th><th>Freshness</th><th>Status</th><th>Action</th></tr></thead><tbody><template x-for="job in jobs.slice(0,8)" :key="job.id"><tr><td><strong x-text="job.title"></strong></td><td x-text="job.department"></td><td x-text="job.recruiter"></td><td x-text="job.hiringManager||'Unassigned'"></td><td><span class="integrity" :class="scoreClass(job.score)"><i class="fa-solid fa-shield-halved"></i><span x-text="`${job.score} / 100`"></span></span></td><td x-text="job.lastConfirmedAt ? `${daysAgo(job.lastConfirmedAt)} days ago` : 'Not published'"></td><td><span class="status" :class="statusClass(job.status)" x-text="job.status"></span></td><td><button class="btn btn-secondary btn-small" @click="activeJobId=job.id;setPage('listings')">View</button></td></tr></template></tbody></table></div></section>
<section x-show="workspacePage==='create'"><div class="page-heading"><div><h1>Create Job</h1><p>Complete the approval route before CareerOS Verify evaluates the vacancy.</p></div><button class="btn btn-secondary btn-small" @click="saveDraft()">Save Draft</button></div><div class="split"><div class="panel"><div class="wizard-steps"><template x-for="[n,label] in [[1,'1. Vacancy Approval'],[2,'2. Role Details'],[3,'3. Requirements'],[4,'4. Review & Validate']]" :key="n"><button :class="wizardStep===n?'active':''" @click="wizardStep=n" x-text="label"></button></template></div><div x-show="wizardStep===1" class="form-grid"><div class="field"><label>Requisition ID</label><input class="input" x-model="draft.requisitionId" placeholder="REQ-2026-0150"></div><div class="field"><label>Department</label><input class="input" x-model="draft.department"></div><div class="field"><label>Number of vacancies</label><input type="number" class="input" x-model.number="draft.vacancies"></div><div class="field"><label>Recruiter</label><input class="input" x-model="draft.recruiter"></div><div class="field"><label>Hiring manager</label><input class="input" x-model="draft.hiringManager" placeholder="Assigned manager"></div><div class="field"><label>Target start date</label><input type="date" class="input" x-model="draft.targetStartDate"></div><div class="field"><label>Headcount approved</label><select class="input" x-model.boolean="draft.headcountApproved"><option :value="false">No</option><option :value="true">Yes</option></select></div><div class="field"><label>Budget approved</label><select class="input" x-model.boolean="draft.budgetApproved"><option :value="false">No</option><option :value="true">Yes</option></select></div><div class="field"><label>Intended publication date</label><input type="date" class="input" x-model="draft.intendedPublicationDate"></div><div class="field"><label>Active-confirmation frequency</label><select class="input" x-model.number="draft.confirmationFrequency"><option :value="30">Every 30 days</option></select></div><div class="field full"><label>Business justification</label><textarea class="input textarea" x-model="draft.businessJustification" placeholder="Why is this vacancy required now?"></textarea></div></div>
<div x-show="wizardStep===2" class="form-grid"><div class="field"><label>Job title</label><input class="input" x-model="draft.title" placeholder="e.g. Data Analyst"></div><div class="field"><label>Location</label><input class="input" x-model="draft.location"></div><div class="field"><label>Workplace arrangement</label><select class="input" x-model="draft.workplace"><option>Hybrid</option><option>On-site</option><option>Remote</option></select></div><div class="field"><label>Employment type</label><select class="input" x-model="draft.employmentType"><option>Full-time</option><option>Part-time</option><option>Contract</option><option>Internship</option></select></div><div class="field"><label>Seniority</label><select class="input" x-model="draft.seniority"><option>Entry level</option><option>Mid level</option><option>Senior</option><option>Director</option><option>Internship</option></select></div><div class="field"><label>Reporting line</label><input class="input" x-model="draft.reportingLine" placeholder="Reports to..."></div><div class="field"><label>Minimum salary</label><input type="number" class="input" x-model.number="draft.salaryMin"></div><div class="field"><label>Maximum salary</label><input type="number" class="input" x-model.number="draft.salaryMax"></div><div class="field"><label>Currency</label><select class="input" x-model="draft.currency"><option>MYR</option><option>SGD</option><option>USD</option></select></div><div class="field"><label>Salary visibility</label><select class="input" x-model.boolean="draft.salaryVisible"><option :value="true">Visible to candidates</option><option :value="false">Hidden</option></select></div><div class="field full"><label>Job summary</label><textarea class="input textarea" x-model="draft.summary" placeholder="A clear, candidate-facing role summary."></textarea></div><div class="field full"><label>Responsibilities</label><textarea class="input textarea" x-model="draft.responsibilities" placeholder="Describe the work and expected outcomes."></textarea></div></div>
<div x-show="wizardStep===3"><div class="page-heading"><div><h2>Requirements</h2><p>Add only the requirements that are truly necessary for the role.</p></div><button class="btn btn-secondary btn-small" @click="addRequirement()"><i class="fa-solid fa-plus"></i> Add requirement</button></div><template x-for="(req,i) in draft.requirements" :key="i"><div class="requirement"><div class="field"><label>Requirement name</label><input class="input" x-model="req.name" placeholder="e.g. SQL"></div><div class="field"><label>Type</label><select class="input" x-model="req.type"><option>Technical</option><option>Soft skill</option><option>Education</option></select></div><div class="field"><label>Priority</label><select class="input" x-model.boolean="req.required"><option :value="true">Required</option><option :value="false">Preferred</option></select></div><div class="field"><label>Min. years</label><input type="number" min="0" class="input" x-model.number="req.years"></div><div class="field"><label>Recruiter justification</label><input class="input" x-model="req.justification" placeholder="Why it matters"></div><button class="btn btn-secondary btn-small remove" @click="removeRequirement(i)"><i class="fa-solid fa-trash"></i></button></div></template></div>
<div x-show="wizardStep===4"><div class="page-heading"><div><h2>Review and Validate</h2><p>Resolve critical blockers before the role can be submitted for manager approval.</p></div><button class="btn btn-primary btn-small" @click="validate(draft)"><i class="fa-solid fa-shield-halved"></i> Run Validation</button></div><div class="review-score"><span>Job Integrity Score</span><strong :class="scoreClass(draft.score)" x-text="`${draft.score} / 100`"></strong><p x-text="draft.score>=80?'Ready for manager approval':draft.score>=60?'Review recommended':'Changes required'"></p></div><div class="validation-list" style="margin-top:16px"><template x-if="!validationRan"><div class="issue"><h4>Validation has not run</h4><p>Run validation to see deterministic policy rules, market evidence, and AI-assisted semantic review findings.</p></div></template><template x-for="issue in draft.blockers" :key="issue"><div class="issue critical"><h4>Critical blocker · Policy Rule</h4><p x-text="issue"></p><small>Why it matters: vacancies cannot be approved or published without internal authorisation.</small></div></template><template x-for="issue in draft.warnings" :key="issue"><div class="issue warning"><h4>Warning · Market Evidence</h4><p x-text="issue"></p><small>Recommended correction: edit the relevant field or acknowledge this warning before submitting.</small></div></template><template x-for="pass in draft.passed||[]" :key="pass"><div class="issue pass"><h4>Passed check</h4><p x-text="pass"></p></div></template></div></div>
<div style="display:flex;justify-content:space-between;margin-top:22px"><button class="btn btn-secondary" @click="wizardStep=Math.max(1,wizardStep-1)">Previous</button><div style="display:flex;gap:8px"><button class="btn btn-secondary" @click="saveDraft()">Save Draft</button><button x-show="wizardStep<4" class="btn btn-primary" @click="wizardStep++">Continue</button><button x-show="wizardStep===4" class="btn btn-primary" @click="submitForApproval()">Submit for Manager Approval</button></div></div></div><aside class="panel side-note"><h3>Validation logic</h3><div class="legend"><div><i class="fa-solid fa-circle-xmark" style="color:#ef4444"></i> Policy Rules control blockers and eligibility.</div><div><i class="fa-solid fa-chart-line" style="color:#fbbf24"></i> Market Evidence highlights exceptions.</div><div><i class="fa-solid fa-wand-magic-sparkles" style="color:#60a5fa"></i> AI-Assisted Semantic Review is optional.</div></div></aside></div></section>
<section x-show="workspacePage==='approvals'"><div class="page-heading"><div><h1>Approvals</h1><p>Human approval is the required gate before publication.</p></div><span class="demo-pill">DEMO ROLE: <span x-text="role"></span></span></div><div class="panel table-wrap"><table class="table"><thead><tr><th>Role</th><th>Recruiter</th><th>Hiring manager</th><th>Score</th><th>Validation</th><th>Status</th><th>Actions</th></tr></thead><tbody><template x-for="job in jobs.filter(j=>['Pending Approval','Needs Changes','Approved','Rejected'].includes(j.status))" :key="job.id"><tr><td><strong x-text="job.title"></strong></td><td x-text="job.recruiter"></td><td x-text="job.hiringManager||'Unassigned'"></td><td :class="scoreClass(job.score)" x-text="`${job.score}/100`"></td><td x-text="job.blockers?.length?`${job.blockers.length} blocker(s)`:job.warnings?.length?`${job.warnings.length} warning(s)`:'Passed' "></td><td><span class="status" :class="statusClass(job.status)" x-text="job.status"></span></td><td><div class="listing-actions"><button class="btn btn-secondary btn-small" @click="activeJobId=job.id">Review</button><template x-if="job.status==='Pending Approval' && role==='Hiring Manager'"><span><label class="checkbox" style="font-size:11px"><input type="checkbox" x-model="managerAttests"> I confirm this vacancy is approved, funded, intended to be filled, and accurately represents the department's needs.</label><button class="btn btn-primary btn-small" @click="approve(job)">Approve</button><button class="btn btn-secondary btn-small" @click="requestChanges(job)">Request Changes</button><button class="btn btn-secondary btn-small" @click="reject(job)">Reject</button></span></template><button x-show="job.status==='Approved' && role==='Recruiter'" class="btn btn-primary btn-small" @click="publish(job)">Publish</button></div></td></tr></template></tbody></table></div><div x-show="activeJobId && job(activeJobId)" class="panel" style="margin-top:18px"><h2>Review evidence</h2><p style="color:#b3b3bb;line-height:1.6">Demo Verified Employer: verified company profile, named recruiter, named hiring manager, approved requisition route, and recorded audit history. This demonstration does not claim a real company-registry lookup.</p><div class="validation-list"><template x-for="issue in (job(activeJobId)?.warnings || [])" :key="issue"><div class="issue warning"><h4>Warning</h4><p x-text="issue"></p></div></template><template x-for="comment in (job(activeJobId)?.comments || [])" :key="comment.at"><div class="issue"><h4 x-text="comment.by"></h4><p x-text="comment.text"></p></div></template></div></div></section>
<section x-show="workspacePage==='listings'"><div class="page-heading"><div><h1>Job Listings</h1><p>Each status has a controlled next action. Drafts and pending roles cannot be published.</p></div><button class="btn btn-primary" @click="startJob()"><i class="fa-solid fa-plus"></i> Create Job</button></div><div class="panel table-wrap"><table class="table"><thead><tr><th>Role</th><th>Department</th><th>Score</th><th>Freshness</th><th>Status</th><th>Actions</th></tr></thead><tbody><template x-for="job in jobs" :key="job.id"><tr><td><strong x-text="job.title"></strong><div style="font-size:11px;color:#9999a1;margin-top:4px" x-text="job.requisitionId||'No requisition ID'"></div></td><td x-text="job.department"></td><td :class="scoreClass(job.score)" x-text="`${job.score}/100`"></td><td x-text="job.freshnessStatus||'Not published'"></td><td><span class="status" :class="statusClass(job.status)" x-text="job.status"></span></td><td><div class="listing-actions"><button x-show="['Draft','Needs Changes'].includes(job.status)" class="btn btn-secondary btn-small" @click="startJob(job)">Edit</button><button x-show="['Draft','Needs Changes'].includes(job.status)" class="btn btn-secondary btn-small" @click="validate(job);notify('Validation updated.')">Validate</button><button x-show="job.status==='Pending Approval'" class="btn btn-secondary btn-small" @click="setPage('approvals')">View Submission</button><button x-show="job.status==='Approved' && role==='Recruiter'" class="btn btn-primary btn-small" @click="publish(job)">Publish</button><button x-show="job.status==='Published'" class="btn btn-primary btn-small" @click="candidatePreviewJobId=job.id">Preview Candidate View</button><button x-show="job.status==='Confirmation Due'" class="btn btn-primary btn-small" @click="freshnessJobId=job.id">Confirm Still Hiring</button><button x-show="job.status==='Paused as Stale'" class="btn btn-primary btn-small" @click="freshnessJobId=job.id">Review &amp; Reactivate</button><button x-show="job.status==='Rejected'" class="btn btn-secondary btn-small" @click="startJob(job)">Duplicate</button></div></td></tr></template></tbody></table></div></section>
<section x-show="workspacePage==='evidence'"><div class="page-heading"><div><h1>Market Evidence</h1><p>Use transparent benchmarks to review role realism. External sources never block the workflow.</p></div><span class="status status-amber">Demonstration Market Benchmark</span></div><div class="three-col"><div class="panel"><h3>Comparable advertisements</h3><strong style="font-size:36px;display:block;margin:16px 0">38</strong><p style="color:#aaa">Cached demonstration evidence for comparable mid-level technology and data roles in Malaysia and Singapore.</p></div><div class="panel"><h3>Experience pattern</h3><strong style="font-size:22px;display:block;margin:18px 0;color:#fff">0–2 years</strong><p style="color:#aaa">Typical entry-level benchmark. Requests above 3 years are highlighted for review.</p></div><div class="panel"><h3>Salary range</h3><strong style="font-size:22px;display:block;margin:18px 0;color:#fff">MYR 42k–65k</strong><p style="color:#aaa">Demonstration range. Salary exceptions are flagged, not automatically rejected.</p></div></div><div class="panel" style="margin-top:20px"><h2>Evidence classification</h2><div class="validation-list" style="margin-top:16px"><div class="issue"><h4>Demonstration Market Benchmark</h4><p>Seeded benchmark data used when a live market source is not connected.</p></div><div class="issue"><h4>Live Source</h4><p>Only shown when a configured source responds successfully.</p></div><div class="issue"><h4>Limited Evidence</h4><p>CareerOS Verify keeps the creation, validation, approval, and publication workflow usable when evidence is incomplete.</p></div></div></div></section>
<section x-show="workspacePage==='impact'"><div class="page-heading"><div><h1>Network Impact</h1><p>Only active, verified vacancies become trusted demand signals for Talentbank's network.</p></div><span class="status status-green">Trusted demand service</span></div><div class="impact-grid"><div class="impact-number"><strong x-text="jobs.length"></strong><span>Vacancies validated</span></div><div class="impact-number"><strong x-text="jobs.reduce((a,j)=>a+(j.blockers?.length||0),0)"></strong><span>Critical blockers caught</span></div><div class="impact-number"><strong x-text="counts()['Pending Approval']"></strong><span>Awaiting manager approval</span></div><div class="impact-number"><strong x-text="trustedJobs().length"></strong><span>Active verified jobs</span></div><div class="impact-number"><strong x-text="counts()['Confirmation Due']"></strong><span>Confirmation requests due</span></div><div class="impact-number"><strong x-text="counts()['Paused as Stale']"></strong><span>Stale jobs paused</span></div><div class="impact-number"><strong x-text="trustedJobs().length"></strong><span>Verified demand signals</span></div><div class="impact-number"><strong x-text="jobs.reduce((a,j)=>a+(j.warnings?.length||0),0)"></strong><span>Requirements corrected</span></div></div><div class="panel" style="margin-top:20px"><h2>Verified skills demand</h2><p style="color:#aaa">Only requirements from trusted active jobs are included.</p><div class="validation-list" style="margin-top:15px"><template x-for="[skill,count] in demandSkills()" :key="skill"><div class="issue pass"><h4 x-text="skill"></h4><p x-text="`${count} active verified vacancy${count===1?'':'ies'} requesting this skill.`"></p></div></template><div x-show="!demandSkills().length" class="empty">No active verified demand signals are available yet.</div></div></div><div class="beneficiaries"><article class="beneficiary"><h3>Employers</h3><ul><li>Fewer unauthorised advertisements</li><li>Clear accountability</li><li>Better-quality applications</li><li>Stronger employer trust</li></ul></article><article class="beneficiary"><h3>Candidates</h3><ul><li>Evidence the vacancy is approved</li><li>Realistic requirements</li><li>Salary transparency</li><li>Active-hiring confirmation</li></ul></article><article class="beneficiary"><h3>Talentbank Network</h3><ul><li>Cleaner matching inputs</li><li>Reliable employer demand</li><li>Better recommendations</li><li>Stale roles excluded</li></ul></article></div><div class="network-flow">Employer creates job → CareerOS validates → Manager approves → Verification published → Hiring activity reconfirmed → Talentbank distributes verified opportunity → Anonymised verified demand informs the wider network</div></section>
<section x-show="workspacePage==='audit'"><div class="page-heading"><div><h1>Audit Log</h1><p>Every material action is recorded for this demonstration.</p></div></div><div class="panel table-wrap"><table class="table"><thead><tr><th>Timestamp</th><th>User</th><th>Demo role</th><th>Action</th><th>Job</th><th>Previous</th><th>New</th><th>Comment</th></tr></thead><tbody><template x-for="event in audit" :key="event.id"><tr><td x-text="event.at"></td><td x-text="event.user"></td><td x-text="event.role"></td><td><strong x-text="event.action"></strong></td><td x-text="event.job"></td><td x-text="event.from||'—'"></td><td x-text="event.to||'—'"></td><td x-text="event.comment||'—'"></td></tr></template></tbody></table></div></section>
<section x-show="workspacePage==='settings'"><div class="page-heading"><div><h1>Settings</h1><p>Demonstration controls for judges and reviewers.</p></div></div><div class="panel" style="max-width:650px"><h2>Demo data</h2><p style="color:#aaa;line-height:1.6">Reset restores seeded scenarios: healthy draft, critical blockers, needs changes, pending approval, approved, published active, confirmation due, paused stale, filled, and rejected. This does not create any authentication records or transmit credentials.</p><button class="btn btn-secondary" @click="resetDemo()">Reset demonstration</button></div></section>
</main></div></div></template>
<template x-if="freshnessJobId && job(freshnessJobId)"><div class="modal-bg"><article class="modal"><div class="modal-header"><div><div style="color:#ff7070;font-size:12px;font-weight:800;letter-spacing:.08em">ACTIVE-HIRING CONFIRMATION</div><h2 x-text="job(freshnessJobId).title"></h2><p style="color:#aaa;margin:5px 0 0" x-text="job(freshnessJobId).status === 'Paused as Stale' ? 'This vacancy is paused and is not visible to candidates.' : 'Confirm whether recruitment is still active.'"></p></div><button class="text-button" aria-label="Close active-hiring confirmation" @click="freshnessJobId=null"><i class="fa-solid fa-xmark"></i></button></div><div class="passport-grid"><div class="passport-item"><span>Current status</span><strong x-text="job(freshnessJobId).status"></strong></div><div class="passport-item"><span>Last confirmed active</span><strong x-text="job(freshnessJobId).lastConfirmedAt?`${daysAgo(job(freshnessJobId).lastConfirmedAt)} days ago`:'Not confirmed'"></strong></div><div class="passport-item"><span>Next confirmation date</span><strong x-text="formatDate(job(freshnessJobId).confirmationDueAt)"></strong></div><div class="passport-item"><span>Authorised action</span><strong>Hiring Manager or HR Administrator</strong></div></div><div class="listing-actions" style="margin-top:20px"><button class="btn btn-primary" @click="confirm(job(freshnessJobId));freshnessJobId=null" x-text="job(freshnessJobId).status === 'Paused as Stale' ? 'Reconfirm and Reactivate' : 'Confirm Still Hiring'"></button><button x-show="job(freshnessJobId).status !== 'Paused as Stale'" class="btn btn-secondary" @click="setLifecycle(job(freshnessJobId),'pause')">Pause Vacancy</button><button x-show="job(freshnessJobId).status === 'Paused as Stale'" class="btn btn-secondary" @click="keepPaused()">Keep Paused</button><button class="btn btn-secondary" @click="setLifecycle(job(freshnessJobId),'filled')">Mark Position Filled</button><button x-show="job(freshnessJobId).status === 'Paused as Stale'" class="btn btn-secondary" @click="setLifecycle(job(freshnessJobId),'close')">Close Vacancy</button></div></article></div></template>
<template x-if="candidatePreviewJobId && job(candidatePreviewJobId)"><div class="modal-bg"><article class="modal"><div class="modal-header"><div><div style="color:#ff7070;font-size:12px;font-weight:800;letter-spacing:.08em">CAREEROS VERIFIED VACANCY</div><h2 x-text="job(candidatePreviewJobId).title"></h2><p style="color:#aaa;margin:5px 0 0">Candidate-facing verification preview</p></div><button class="text-button" aria-label="Close candidate preview" @click="candidatePreviewJobId=null"><i class="fa-solid fa-xmark"></i></button></div><div class="passport-grid"><div class="passport-item"><span>Employer verification</span><strong>Demo Verified Employer</strong></div><div class="passport-item"><span>Job Integrity Score</span><strong x-text="`${job(candidatePreviewJobId).score} / 100`"></strong></div><div class="passport-item"><span>Internal approval</span><strong>Headcount and budget approved</strong></div><div class="passport-item"><span>Hiring manager confirmation</span><strong>Confirmed</strong></div><div class="passport-item"><span>Requirements and salary review</span><strong>Reviewed</strong></div><div class="passport-item"><span>Publication date</span><strong x-text="formatDate(job(candidatePreviewJobId).publishedAt)"></strong></div><div class="passport-item"><span>Last confirmed active</span><strong x-text="job(candidatePreviewJobId).lastConfirmedAt?`${daysAgo(job(candidatePreviewJobId).lastConfirmedAt)} days ago`:'Awaiting confirmation'"></strong></div><div class="passport-item"><span>Next confirmation date</span><strong x-text="formatDate(job(candidatePreviewJobId).confirmationDueAt)"></strong></div><div class="passport-item"><span>Material warnings resolved</span><strong x-text="job(candidatePreviewJobId).warnings?.length?'Review noted':'Resolved' "></strong></div></div><p style="color:#909099;font-size:12px;line-height:1.5;margin:20px 0 0">This verification preview shows candidates the trust signals attached to this vacancy. Confidential budget information, private contact details, internal comments and business justification are not displayed.</p></article></div></template>
<div x-show="toast" x-transition class="toast" x-text="toast"></div>
</body></html>
